<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
<title>NEXUS // IDLE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<meta name="theme-color" content="#00f5ff" id="theme-meta">
<style>
/* ═══════════════════════════════════════════
   THEMES — Fixed variable dashes
   ═══════════════════════════════════════════ */
:root {
--bg:     #020810;
--bg2:    #040f1e;
--c1:     #00f5ff;
--c1dim:  rgba(0,245,255,0.15);
--c1glow: rgba(0,245,255,0.30);
--c2:     #00bcd4;
--c3:     #39ff14;
--c4:     #ff006e;
--c5:     #ffd60a;
--c6:     #ff6b00;
--border: rgba(0,245,255,0.28);
--border2:rgba(0,245,255,0.12);
--txt:    #e8f4ff;
--txt2:   #8ab4cc;
--txt3:   #4a7a90;
--tap-flash: rgba(0,245,255,0.10);
--grid-c: rgba(0,245,255,0.05);
--ring1:  rgba(0,245,255,0.45);
--ring2:  rgba(57,255,20,0.32);
}

:root.light-mode {
--bg:     #f5f8fa;
--bg2:    #ffffff;
--c1:     #0088cc;
--c1dim:  rgba(0,136,204,0.12);
--c1glow: rgba(0,136,204,0.25);
--c2:     #0066aa;
--c3:     #00aa44;
--c4:     #cc0055;
--c5:     #dd9900;
--c6:     #dd5500;
--border: rgba(0,136,204,0.3);
--border2:rgba(0,136,204,0.15);
--txt:    #1a2634;
--txt2:   #4a5f7a;
--txt3:   #7a8fa4;
--tap-flash: rgba(0,136,204,0.15);
--grid-c: rgba(0,136,204,0.08);
--ring1:  rgba(0,136,204,0.4);
--ring2:  rgba(0,170,68,0.35);
}

/* ═══════════════════════════════════════════
RESET & BODY
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;background:var(--bg);font-size:16px;}
body{
background:var(--bg);
font-family:'Share Tech Mono',monospace;
color:var(--txt);
position:fixed;width:100%;height:100%;
}

/* Grid background */
#grid-bg{
position:fixed;inset:0;z-index:0;
background-image:
linear-gradient(var(--grid-c) 1px, transparent 1px),
linear-gradient(90deg, var(--grid-c) 1px, transparent 1px);
background-size:40px 40px;
animation:gridScroll 22s linear infinite;
}

@keyframes gridScroll{from{background-position:0 0;}to{background-position:0 40px;}}

/* Corner brackets */
.corner{position:fixed;width:44px;height:44px;z-index:3;}
.corner.tl{top:max(0px, env(safe-area-inset-top, 0px));left:max(0px, env(safe-area-inset-left, 0px));border-top:2px solid var(--c1);border-left:2px solid var(--c1);}
.corner.tr{top:max(0px, env(safe-area-inset-top, 0px));right:max(0px, env(safe-area-inset-right, 0px));border-top:2px solid var(--c1);border-right:2px solid var(--c1);}
.corner.bl{bottom:max(0px, env(safe-area-inset-bottom, 0px));left:max(0px, env(safe-area-inset-left, 0px));border-bottom:2px solid var(--c1);border-left:2px solid var(--c1);}
.corner.br{bottom:max(0px, env(safe-area-inset-bottom, 0px));right:max(0px, env(safe-area-inset-right, 0px));border-bottom:2px solid var(--c1);border-right:2px solid var(--c1);}

#particles{position:fixed;inset:0;pointer-events:none;z-index:5;}

#app{
position:relative;z-index:6;
display:flex;flex-direction:column;
height:100vh;height:100dvh;min-height:100dvh;
overflow:hidden;
padding-bottom:max(56px, calc(48px + env(safe-area-inset-bottom, 0px)));
box-sizing:border-box;
}

/* ── HEADER ─────────────────────────────── */
#header{
padding-top:calc(20px + env(safe-area-inset-top, 0px));
padding-left:max(16px, env(safe-area-inset-left, 0px));
padding-right:max(16px, env(safe-area-inset-right, 0px));
padding-bottom:10px;
background:var(--bg2);
border-bottom:1px solid var(--border);
flex-shrink:0;
}

#sys-label{
font-family:'Orbitron',monospace;font-size:8px;
letter-spacing:4px;color:var(--c1);opacity:0.5;margin-bottom:3px;
}

#credit-count{
font-family:'Orbitron',monospace;
font-size:clamp(28px,7vw,44px);font-weight:900;
color:var(--c1);letter-spacing:2px;line-height:1;
text-shadow:0 0 18px var(--c1glow);
}

#credit-unit{font-size:9px;letter-spacing:3px;color:var(--txt2);margin-top:2px;}

.stats-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}

.stat-box{
border:1px solid var(--border2);background:var(--c1dim);
padding:3px 8px;border-radius:3px;font-size:8px;color:var(--txt2);
position:relative;overflow:hidden;
flex:0 1 auto;
min-width:64px;
max-width:140px;
}

.stat-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--c1);opacity:0.5;}
.stat-box .val{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;display:block;color:var(--c1);}
.stat-box.s-green .val{color:var(--c3);}
.stat-box.s-green{border-color:rgba(57,255,20,0.15);background:rgba(57,255,20,0.06);}
.stat-box.s-green::after{background:var(--c3);}
.stat-box.s-orange .val{color:var(--c6);}
.stat-box.s-orange{border-color:rgba(255,107,0,0.18);background:rgba(255,107,0,0.06);}
.stat-box.s-orange::after{background:var(--c6);}

#prestige-btn, #quantum-btn{
display:none;width:100%;margin-top:7px;padding:7px;
font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:3px;
}
#prestige-btn{border:1px solid var(--c4);background:rgba(255,0,110,0.08);color:var(--c4);}
#quantum-btn{border:1px solid var(--c5);background:rgba(255,214,10,0.08);color:var(--c5);}

.header-main-row{display:flex;flex-direction:row;justify-content:space-between;align-items:flex-start;gap:10px;width:100%;position:relative;z-index:20;}
.header-credits-col{min-width:0;flex:1;}
.header-cheat-wrap{position:relative;flex-shrink:0;align-self:flex-start;padding-top:4px;z-index:9999;pointer-events:auto;}

.header-cheat-btn{
width:42px;height:40px;border-radius:5px;
border:1px solid rgba(255,0,110,0.5);background:rgba(255,0,110,0.12);
color:var(--c4);font-size:18px;line-height:1;cursor:pointer;
display:flex;align-items:center;justify-content:center;
font-family:'Orbitron',monospace;
box-shadow:0 0 12px rgba(255,0,110,0.15);
}

.header-cheat-dd{
display:none;flex-direction:column;
position:absolute;top:100%;right:0;margin-top:6px;
min-width:240px;max-width:min(calc(100vw - 24px), 320px);
z-index:9999;
background:linear-gradient(180deg, rgba(255,255,255,0.03), transparent 28%), var(--bg2);
border:1px solid var(--c4);
border-radius:8px;box-shadow:0 14px 40px rgba(0,0,0,0.5);
padding:6px 0 8px;
max-height:min(70vh, 560px);
overflow-y:auto;
}
.header-cheat-dd.open{display:flex;}

.hcd-title, .hcd-subtitle{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:3px;padding:6px 14px;}
.hcd-subtitle{color:var(--c5);border-top:1px solid var(--border2);margin-top:5px;}

.hcd-item{
display:block;width:100%;text-align:left;padding:9px 14px;border:none;background:transparent;
color:var(--txt);font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;
}

.hcd-input-row, .hcd-grid{display:flex;gap:8px;padding:8px 14px;}
.hcd-grid{flex-wrap:wrap;}

.hcd-grid button, .theme-btn{
flex:1;min-width:56px;padding:7px;background:rgba(0,245,255,0.06);
border:1px solid var(--border2);border-radius:3px;color:var(--txt);
font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;
}
.theme-btn.active{border-color:var(--c1);background:var(--c1dim);}

/* ── TAP ZONE ─────────────────────────────── */
#tap-zone{
flex:1;position:relative;overflow:hidden;
background:radial-gradient(circle at center, rgba(0,245,255,0.03), transparent 60%);
transition:background 0.1s ease;
cursor:pointer;touch-action:manipulation;
}

#tap-zone.tapped{background:radial-gradient(circle at center, var(--tap-flash), transparent 50%);}

#tap-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;pointer-events:none;}
.ring{position:absolute;border-radius:50%;border:1.5px solid;opacity:0.6;animation:ringPulse 3.5s ease-in-out infinite;}
.ring.r1{inset:0;border-color:var(--ring1);animation-delay:0s;}
.ring.r2{inset:18px;border-color:var(--ring2);animation-delay:0.7s;}
.ring.r3{inset:36px;border-color:var(--ring1);animation-delay:1.4s;}

@keyframes ringPulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:0.85;transform:scale(1.04);}}

#tap-core{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:86px;height:86px;border-radius:50%;
border:2px solid var(--c1);background:radial-gradient(circle, rgba(0,245,255,0.14), transparent 70%);
display:flex;align-items:center;justify-content:center;
box-shadow:0 0 28px var(--c1glow);
animation:corePulse 2.8s ease-in-out infinite;
}

@keyframes corePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.92;}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1;}}

#tap-core-icon{font-size:28px;color:var(--c1);text-shadow:0 0 12px var(--c1glow);font-family:'Orbitron',monospace;font-weight:900;}

/* ── DRAWER ──────────────────────────────── */
#drawer{
position:fixed;bottom:0;left:0;right:0;
background:var(--bg2);border-top:1px solid var(--border);z-index:50;
transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
max-height:calc(72vh - env(safe-area-inset-bottom, 0px));
display:flex;flex-direction:column;
padding-bottom:env(safe-area-inset-bottom, 0px);
}
#drawer.collapsed{transform:translateY(calc(100% - 56px - env(safe-area-inset-bottom, 0px)));}

#tabs-bar{display:flex;justify-content:space-around;padding:0 6px;height:56px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.tab-btn{flex:1;background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:9px;font-family:'Orbitron',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.tab-btn.active{color:var(--c1);border-bottom:2px solid var(--c1);}

#upgrades-list, #offline-list, #quantum-list, #settings-panel, #stats-panel {display:none;flex-direction:column;gap:6px;padding:12px 10px;overflow-y:auto;flex:1;}
.vis {display:flex !important;}

.up-card, .off-card, .qn-card{
background:linear-gradient(135deg, var(--c1dim), rgba(0,245,255,0.04));
border:1px solid var(--border2);border-radius:5px;padding:10px;display:flex;align-items:center;justify-content:space-between;
}
.up-name, .off-name, .qn-name{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--c1);margin-bottom:2px;}
.up-desc, .off-desc, .qn-desc{font-size:8px;color:var(--txt2);}

.up-buy-btn{
background:rgba(0,245,255,0.12);border:1px solid var(--c1);border-radius:4px;
padding:7px 12px;color:var(--c1);font-family:'Orbitron',monospace;font-size:9px;min-width:68px;
}

/* Settings toggles */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--c1dim);border:1px solid var(--border2);border-radius:4px;margin-bottom:5px;}
.setting-label{font-size:10px;color:var(--txt);font-family:'Orbitron',monospace;}

.toggle{width:44px;height:24px;background:rgba(128,128,128,0.3);border-radius:12px;position:relative;cursor:pointer;}
.toggle.on{background:var(--c1);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--txt3);transition:transform 0.2s;}
.toggle.on::after{transform:translateX(20px);background:#fff;}

/* Float/Toast */
.float-text{position:fixed;pointer-events:none;font-family:'Orbitron',monospace;font-weight:700;font-size:15px;color:var(--c1);animation:floatUp 1.1s ease-out forwards;z-index:100;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;background:var(--bg2);border:1px solid var(--c1);border-radius:6px;padding:12px 16px;display:none;color:var(--txt);font-family:'Share Tech Mono',monospace;font-size:10px;}
#toast.show{display:block;}

#idle-bar{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom, 0px));left:0;height:2px;background:var(--c3);transition:width 0.1s linear;z-index:60;}
</style>
</head>
<body>

<div id="grid-bg"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<canvas id="particles"></canvas>

<div id="app">
  <div id="header">
    <div class="header-main-row">
      <div class="header-credits-col">
        <div id="sys-label">NEXUS SYSTEM</div>
        <div id="credit-count">0</div>
        <div id="credit-unit">CREDITS</div>
        <div class="stats-row">
          <div class="stat-box"><span>CPS</span><span class="val" id="stat-cps">0</span></div>
          <div class="stat-box s-green"><span>TAP</span><span class="val" id="stat-tap">1</span></div>
          <div class="stat-box s-orange"><span>MULT</span><span class="val" id="stat-mult">×1</span></div>
        </div>
        <button id="prestige-btn">PRESTIGE</button>
        <button id="quantum-btn">QUANTUM</button>
      </div>
      <div class="header-cheat-wrap" id="cheat-wrap">
        <button class="header-cheat-btn" id="cheat-toggle">⚙</button>
        <div class="header-cheat-dd" id="cheat-dd">
          <div class="hcd-title">ADMIN CONSOLE</div>
          <button class="hcd-item" id="ch-infinite">Toggle Infinite Coins</button>
          <button class="hcd-item" id="ch-freebuy">Toggle Free Buys</button>
          <div class="hcd-grid">
            <button id="ch-1k">+1K</button><button id="ch-1m">+1M</button>
          </div>
          <button class="hcd-item hcd-danger" id="ch-reset">Hard Reset</button>
        </div>
      </div>
    </div>
  </div>

  <div id="tap-zone">
    <div id="tap-rings"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div></div>
    <div id="tap-core"><div id="tap-core-icon">⬡</div></div>
  </div>

  <div id="drawer" class="collapsed">
    <div id="tabs-bar">
      <button class="tab-btn" id="tab-pps">📈 PPS</button>
      <button class="tab-btn" id="tab-ppc">👆 PPC</button>
      <button class="tab-btn" id="tab-settings">⚙ SETTINGS</button>
    </div>
    <div id="drawer-content">
      <div id="upgrades-list"></div>
      <div id="settings-panel">
        <div class="setting-row">
          <span class="setting-label">DARK MODE</span>
          <div class="toggle on" id="tog-dark"></div>
        </div>
        <div class="hcd-subtitle" style="padding-left:0">ACTIVE THEME</div>
        <div id="theme-buttons" class="hcd-grid" style="padding:0"></div>
      </div>
    </div>
  </div>
</div>

<div id="idle-bar" style="width:0%;"></div>
<div id="toast"></div>

<script>
const G={
  coins:0,totalCoins:0, prestigeMult:1,prestigeCount:0,prestigeRunStart:Date.now(),fastestPrestigeMs:0,
  quantumUnlocked:false,quantumPoints:0,totalQuantumPoints:0,quantumCount:0,quantumRunStart:Date.now(),lastSeen:Date.now()
};

const S={particles:true,pconf:true,theme:'nexus',darkMode:true,autoSave:true,soundFx:false,compactMode:false,saveInterval:15};

const PPS=[{id:'pps1',name:'DATA NODE',desc:'Passive income',baseCost:10,growth:1.15,baseCPS:0.1,owned:0,icon:'🖥'}];
const PPC=[{id:'ppc1',name:'CLICK BOOSTER',desc:'Improve clicks',baseCost:15,growth:1.15,baseBoost:1,owned:0,icon:'👆'}];

const THEMES={
  nexus:{bg:'#020810',bg2:'#040f1e',c1:'#00f5ff',c1dim:'rgba(0,245,255,0.15)',c1glow:'rgba(0,245,255,0.30)',c2:'#00bcd4',c3:'#39ff14',c4:'#ff006e',c5:'#ffd60a',c6:'#ff6b00',border:'rgba(0,245,255,0.28)',border2:'rgba(0,245,255,0.12)',txt:'#e8f4ff',txt2:'#8ab4cc',txt3:'#4a7a90','tap-flash':'rgba(0,245,255,0.10)','grid-c':'rgba(0,245,255,0.05)',ring1:'rgba(0,245,255,0.45)',ring2:'rgba(57,255,20,0.32)'},
  crimson:{bg:'#0a0303',bg2:'#150505',c1:'#ff0040',c1dim:'rgba(255,0,64,0.15)',c1glow:'rgba(255,0,64,0.30)',c2:'#cc0033',c3:'#ff4d6a',c4:'#ffcc00',c5:'#00ffcc',c6:'#ff8800',border:'rgba(255,0,64,0.28)',border2:'rgba(255,0,64,0.12)',txt:'#ffe8ee',txt2:'#cc8899',txt3:'#994455','tap-flash':'rgba(255,0,64,0.10)','grid-c':'rgba(255,0,64,0.05)',ring1:'rgba(255,0,64,0.45)',ring2:'rgba(255,77,106,0.32)'},
  void:{bg:'#000000',bg2:'#0a0a0a',c1:'#9933ff',c1dim:'rgba(153,51,255,0.15)',c1glow:'rgba(153,51,255,0.30)',c2:'#6600cc',c3:'#00ffaa',c4:'#ff0066',c5:'#ffcc00',c6:'#ff6600',border:'rgba(153,51,255,0.28)',border2:'rgba(153,51,255,0.12)',txt:'#eeddff',txt2:'#9988cc',txt3:'#664488','tap-flash':'rgba(153,51,255,0.10)','grid-c':'rgba(153,51,255,0.05)',ring1:'rgba(153,51,255,0.45)',ring2:'rgba(0,255,170,0.32)'}
};

let activeTab='pps', cheatInfiniteCoins=false, cheatFreeBuy=false, interactionLocked=false;

function updateUI(){
  document.getElementById('credit-count').textContent=Math.floor(G.coins).toLocaleString();
  document.getElementById('stat-cps').textContent=(PPS[0].owned * PPS[0].baseCPS * G.prestigeMult).toFixed(1);
  document.getElementById('stat-tap').textContent=Math.floor((1 + PPC[0].owned * PPC[0].baseBoost) * G.prestigeMult);
  document.getElementById('stat-mult').textContent='×'+G.prestigeMult;
}

function renderUpgrades(){
  const list = activeTab==='pps' ? PPS : PPC;
  const ul=document.getElementById('upgrades-list');
  ul.innerHTML='';
  list.forEach(u=>{
    const cost = Math.floor(u.baseCost * Math.pow(u.growth, u.owned));
    const card=document.createElement('div');
    card.className='up-card';
    card.innerHTML=`<div class="up-info"><div class="up-name">${u.icon} ${u.name}</div><div class="up-desc">Owned: ${u.owned}</div></div>
    <button class="up-buy-btn" onclick="buyUpgrade('${u.id}')">BUY ${cost}</button>`;
    ul.appendChild(card);
  });
}

function buyUpgrade(id){
  const u = [...PPS, ...PPC].find(x=>x.id===id);
  const cost = Math.floor(u.baseCost * Math.pow(u.growth, u.owned));
  if(G.coins>=cost || cheatFreeBuy){
    if(!cheatFreeBuy) G.coins-=cost;
    u.owned++;
    renderUpgrades(); updateUI();
  }
}

function switchTab(tab){
  activeTab=tab;
  document.getElementById('drawer').classList.remove('collapsed');
  ['pps','ppc','settings'].forEach(t=>{
    document.getElementById('upgrades-list').style.display = (tab==='pps'||tab==='ppc') ? 'flex' : 'none';
    document.getElementById('settings-panel').classList.toggle('vis', tab==='settings');
  });
  renderUpgrades();
}

function applySettings(){
  document.documentElement.classList.toggle('light-mode', !S.darkMode);
  document.getElementById('tog-dark').classList.toggle('on', S.darkMode);
  applyTheme(S.theme);
}

function applyTheme(name){
  const t=THEMES[name];
  const r=document.documentElement.style;
  Object.keys(t).forEach(k=>r.setProperty('--'+k, t[k]));
  S.theme=name;
  buildThemes(); // Refresh active state
}

function buildThemes(){
  const container = document.getElementById('theme-buttons');
  container.innerHTML='';
  Object.keys(THEMES).forEach(k=>{
    const btn = document.createElement('button');
    btn.className = `theme-btn ${S.theme === k ? 'active' : ''}`;
    btn.textContent = k.toUpperCase();
    btn.onclick = () => applyTheme(k);
    container.appendChild(btn);
  });
}

document.getElementById('tap-zone').onclick = (e) => {
  const amt = Math.floor((1 + PPC[0].owned * PPC[0].baseBoost) * G.prestigeMult);
  G.coins += amt; updateUI();
  const f=document.createElement('div'); f.className='float-text'; f.textContent='+'+amt;
  f.style.left=e.clientX+'px'; f.style.top=e.clientY+'px';
  document.body.appendChild(f); setTimeout(()=>f.remove(),1000);
};

document.getElementById('tog-dark').onclick=()=>{ S.darkMode=!S.darkMode; applySettings(); };
document.getElementById('cheat-toggle').onclick=()=>document.getElementById('cheat-dd').classList.toggle('open');
document.getElementById('ch-1k').onclick=()=>{ G.coins+=1000; updateUI(); };
document.getElementById('ch-reset').onclick=()=>location.reload();
