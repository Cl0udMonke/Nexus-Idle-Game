<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Idle Game</title>
    <style>
        body {
            background-color: #f0f0f0; /* Light theme background */
            color: #333; /* Light theme text */
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark {
            background-color: #141414; /* Dark theme background */
            color: #f0f0f0; /* Dark theme text */
        }
        #theme-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <button id="theme-toggle">Toggle Theme</button>
    <script>
        const toggleButton = document.getElementById('theme-toggle');
        toggleButton.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });
    </script>
    <!-- Original content maintained below -->
    <h1>Welcome to Nexus Idle Game!</h1>
    <p>Here is where you can manage your idle game.</p>
</body>
</html>
