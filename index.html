  :root.light-mode {
    --bg: #f0f4f8;
    --bg2: #ffffff;
    --c1: #0077ff;
    --c1dim: rgba(0, 119, 255, 0.15);
    --c1glow: rgba(0, 119, 255, 0.3);
    --c2: #0066dd;
    --c3: #00cc55;
    --c4: #ff0066;
    --c5: #ff9900;
    --c6: #ff5500;
    --border: rgba(0, 119, 255, 0.35);
    --border2: rgba(0, 119, 255, 0.18);
    --txt: #1a2634;
    --txt2: #3a4a5a;
    --txt3: #6a7a8a;
    --tap-flash: rgba(0, 119, 255, 0.12);
    --grid-c: rgba(0, 119, 255, 0.08);
    --ring1: rgba(0, 119, 255, 0.45);
    --ring2: rgba(0, 204, 85, 0.4);
  }

  /* ===== GLOBAL ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-size: 16px;
  }
  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--txt);
    position: fixed;
    width: 100%;
    height: 100%;
    transition: background 0.3s, color 0.3s;
  }

  /* ===== GRID ===== */
  #grid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(var(--grid-c) 1px, transparent 1px), linear-gradient(90deg, var(--grid-c) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 22s linear infinite;
  }

  @keyframes gridScroll {
    from { background-position: 0 0; }
    to { background-position: 0 40px; }
  }

  /* Corner brackets */
  .corner {
    position: fixed;
    width: 44px;
    height: 44px;
    z-index: 3;
  }
  .corner.tl {
    top: max(0px, env(safe-area-inset-top, 0px));
    left: max(0px, env(safe-area-inset-left, 0px));
    border-top: 2px solid var(--c1);
    border-left: 2px solid var(--c1);
  }
  .corner.tr {
    top: max(0px, env(safe-area-inset-top, 0px));
    right: max(0px, env(safe-area-inset-right, 0px));
    border-top: 2px solid var(--c1);
    border-right: 2px solid var(--c1);
  }
  .corner.bl {
    bottom: max(0px, env(safe-area-inset-bottom, 0px));
    left: max(0px, env(safe-area-inset-left, 0px));
    border-bottom: 2px solid var(--c1);
    border-left: 2px solid var(--c1);
  }
  .corner.br {
    bottom: max(0px, env(safe-area-inset-bottom, 0px));
    right: max(0px, env(safe-area-inset-right, 0px));
    border-bottom: 2px solid var(--c1);
    border-right: 2px solid var(--c1);
  }

  /* Canvas overlay */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* ── TAP ZONE ─────────────────────────────── */
  #tap-zone {
    flex-grow: 1;

  /* ── TAP CORE (ENHANCED ANIMATION) ─────── */
  #tap-core {
    position: relative;
    width: clamp(180px, 42vw, 280px);
    height: clamp(180px, 42vw, 280px);
    border-radius: 50%;
    border: 3px solid var(--c1);
    background: radial-gradient(circle, var(--c1dim), transparent);
    box-shadow: 0 0 40px var(--c1glow), 0 0 80px var(--c1glow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.08s, background 0.3s, border-color 0.3s, box-shadow 0.3s;
    animation: corePulse 3s ease-in-out infinite;
  }

  @keyframes corePulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px var(--c1glow), 0 0 80px var(--c1glow); }
    50% { transform: scale(1.05); box-shadow: 0 0 60px var(--c1glow), 0 0 120px var(--c1glow); }
  }

  #tap-core:active {
    transform: scale(0.95) !important;
  }

  #tap-core-label {
    font-family: 'Orbitron', monospace;
    font-size: clamp(11px, 2.8vw, 15px);
    letter-spacing: 3px;
    color: var(--c1);
    text-shadow: 0 0 12px var(--c1glow);
    position: relative;
    z-index: 2;
  }

  /* Outer rings (more prominent) */
  #tap-core::before, #tap-core::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    pointer-events: none;
    animation: ringPulse 4s ease-in-out infinite;
  }

  #tap-core::before { border: 2px solid var(--ring1); animation-delay: 0s; }
  #tap-core::after { border: 2px solid var(--ring2); animation-delay: 2s; }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 0.3; }
  }

  /* Tap flash */
  .tap-flash {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--tap-flash);
    opacity: 0;
    pointer-events: none;
    animation: flashFade 0.4s ease-out;

  @keyframes flashFade {
    0% { opacity: 0.8; transform: scale(1); }

  // ═══════════════════════════════════════════

  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function playTapSound() {
    if (!S.soundFx || !audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
    } catch (e) {}
  }
  function playUpgradeSound() {
    if (!S.soundFx || !audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 1200;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.15);
    } catch (e) {}
  }
  function playPrestigeSound() {
    if (!S.soundFx || !audioCtx) return;

      osc.connect(gain); gain.connect(audioCtx.destination);

  const QUANTUM = [

    { id: "q5", name: "Click Surge", desc: "2x tap power", icon: "👆", cost: 8, owned: 0, clickMult: 2 },
    { id: "q6", name: "Quantum Boost IV", desc: "+100% all production", icon: "⚡", cost: 30, owned: 0, mult: 1.0 },
    { id: "q7", name: "Prestige Power II", desc: "+50% prestige gain", icon: "💫", cost: 40, owned: 0, pMult: 0.5 },
    { id: "q8", name: "Click Surge II", desc: "3x tap power", icon: "👆", cost: 35, owned: 0, clickMult: 3 },
    { id: "q9", name: "Quantum Boost V", desc: "+200% all production", icon: "⚡", cost: 75, owned: 0, mult: 2.0 },
    { id: "q10", name: "Reality Shifter", desc: "+500% all production", icon: "🌠", cost: 150, owned: 0, mult: 5.0 },
    { id: "q11", name: "Infinite Potential", desc: "10x tap power", icon: "👁️", cost: 200, owned: 0, clickMult: 10 },
    { id: "q12", name: "Transcendence", desc: "+1000% all production", icon: "🔆", cost: 500, owned: 0, mult: 10.0 },
  ];

  // GLOBAL STATE
  let cheatInfiniteCoins = false, cheatFreeBuy = false, interactionLocked = false;
  let activeTab = "", drawerOpen = false, autoSaveTimer = null;
  let crimsonClickCount = 0, adminMenuUnlocked = false;
  
  // BULK & REAL-TIME VARS
  let buyAmount = "1"; // "1", "10", "100", "max"
  let recentTaps = []; 

  // ═══════════════════════════════════════════
  //  MATH & CALCULATIONS
  // ═══════════════════════════════════════════
  function prestigeMult() { return 1 + G.prestige * 0.1; }
  
  function quantumMult() {
    let m = 1; QUANTUM.forEach(q => { if (q.mult) m += q.mult * q.owned; }); return m;
  }
  
  function prestigeBoost() {
    let b = 1; QUANTUM.forEach(q => { if (q.pMult) b += q.pMult * q.owned; }); return b;
  }
  
  function clickMult() {
    let m = 1; QUANTUM.forEach(q => { if (q.clickMult && q.owned > 0) m *= Math.pow(q.clickMult, q.owned); }); return m;
  }

  // Milestone Multiplier (Dynamic Scaling)
  function getMilestoneMult(count) {
    let m = 1;
    if (count >= 25) m *= 2;
    if (count >= 50) m *= 2;
    if (count >= 100) m *= 2;
    if (count >= 250) m *= 2;
    if (count >= 500) m *= 2;
    if (count >= 1000) m *= 2;
    return m;
  }

  function getPassiveCPS() {
    let cps = 0;
    PPS.forEach(u => {
      const pps = u.basePPS * Math.pow(1.15, u.owned) * getMilestoneMult(u.owned);
      cps += pps * u.owned;
    });
    return cps * prestigeMult() * quantumMult();
  }

  function getTap() {
    let tap = 1;
    PPC.forEach(u => {
      const ppc = u.basePPC * Math.pow(1.15, u.owned) * getMilestoneMult(u.owned);
      tap += ppc * u.owned;
    });
    return tap * prestigeMult() * quantumMult() * clickMult();
  }

  // Real-Time Total CPS
  function getTotalCPS() {
    const now = performance.now();
    while(recentTaps.length > 0 && now - recentTaps[0] > 1000) {
      recentTaps.shift();
    }
    return getPassiveCPS() + (recentTaps.length * getTap());
  }

  function getOfflineRate() {
    let rate = 0; OFFLINE.forEach(o => { if (o.owned && o.bonus) rate = Math.max(rate, o.bonus); }); return rate;
  }

  function getOfflineTime() {
    let base = 1800; OFFLINE.forEach(o => { if (o.owned && o.time) base += o.time; }); return base;
  }

  function calcBulkCost(base, owned, amount) {
    if (amount === 0) return 0;
    return Math.floor(base * Math.pow(1.15, owned) * (Math.pow(1.15, amount) - 1) / 0.15);
  }

  function calcMaxAffordable(base, owned, coins) {
    if (coins < Math.floor(base * Math.pow(1.15, owned))) return 0;
    let n = Math.floor( Math.log( coins * 0.15 / (base * Math.pow(1.15, owned)) + 1 ) / Math.log(1.15) );
    while (n > 0 && calcBulkCost(base, owned, n) > coins) n--;
    while (calcBulkCost(base, owned, n+1) <= coins) n++;
    
    // Cap at max level
    const remaining = MAX_LEVEL - owned;
    if (n > remaining) n = remaining;
    
    return n;
  }

  function prestigeThresh() { return 100000 * Math.pow(10, G.prestige); }
  function quantumThresh() { return 1e9 * Math.pow(100, G.quantum); }
  function calcPrestigeGain() {
    if (G.coins < prestigeThresh()) return 0;
    return Math.max(1, Math.floor(Math.floor(Math.log10(G.coins / 100000)) * prestigeBoost()));
  }
  function calcQuantumGain() {
    if (G.coins < quantumThresh()) return 0;
    return Math.max(1, Math.floor(Math.log10(G.coins / 1e9)));
  }

  // ═══════════════════════════════════════════
  //  SAVE / LOAD
  // ═══════════════════════════════════════════
  function saveGame() {
    const data = {
      G, S, PPS: PPS.map(u => u.owned), PPC: PPC.map(u => u.owned),
      OFFLINE: OFFLINE.map(o => o.owned), QUANTUM: QUANTUM.map(q => q.owned), adminMenuUnlocked,
    };
    localStorage.setItem("nexus_v5", JSON.stringify(data));
  }

  function loadGame() {
    const raw = localStorage.getItem("nexus_v5");
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      Object.assign(G, data.G); Object.assign(S, data.S);
      if (data.PPS) PPS.forEach((u, i) => (u.owned = data.PPS[i] || 0));
      if (data.PPC) PPC.forEach((u, i) => (u.owned = data.PPC[i] || 0));
      if (data.OFFLINE) OFFLINE.forEach((o, i) => (o.owned = data.OFFLINE[i] || false));
      if (data.QUANTUM) QUANTUM.forEach((q, i) => (q.owned = data.QUANTUM[i] || 0));
      adminMenuUnlocked = data.adminMenuUnlocked || false;
      if (adminMenuUnlocked) document.getElementById("cheat-wrap").style.display = "block";
      processOfflineEarnings();
    } catch (e) { console.error("Load failed", e); }
  }

  function processOfflineEarnings() {
    const now = Date.now();
    const elapsed = Math.floor((now - G.lastSave) / 1000);
    if (elapsed < 10) return;
    const maxOffline = getOfflineTime();
    const offlineRate = getOfflineRate();
    const capElapsed = Math.min(elapsed, maxOffline);
    const cps = getPassiveCPS(); // Passives only for offline
    const earned = cps * capElapsed * offlineRate;
    if (earned > 0) { G.coins += earned; G.totalEarned += earned; showOfflineToast(earned, capElapsed, elapsed > maxOffline); }
    G.lastSave = now;
  }

  function setupAutoSave() {
    if (autoSaveTimer) clearInterval(autoSaveTimer);
    if (S.autoSave) {
      autoSaveTimer = setInterval(() => { G.lastSave = Date.now(); saveGame(); }, S.saveInterval * 1000);
    }
  }

  // ═══════════════════════════════════════════
  //  UI UPDATE
  // ═══════════════════════════════════════════
  function fmt(n) {
    if (n < 1000) return Math.floor(n).toString();
    if (n < 1e6) return (n / 1e3).toFixed(1) + "K";
    if (n < 1e9) return (n / 1e6).toFixed(2) + "M";
    if (n < 1e12) return (n / 1e9).toFixed(2) + "B";
    if (n < 1e15) return (n / 1e12).toFixed(2) + "T";
    if (n < 1e18) return (n / 1e15).toFixed(2) + "Qa";
    if (n < 1e21) return (n / 1e18).toFixed(2) + "Qi";
    if (n < 1e24) return (n / 1e21).toFixed(2) + "Sx";
    if (n < 1e27) return (n / 1e24).toFixed(2) + "Sp";
    if (n < 1e30) return (n / 1e27).toFixed(2) + "Oc";
    if (n < 1e33) return (n / 1e30).toFixed(2) + "No";
    if (n < 1e36) return (n / 1e33).toFixed(2) + "Dc";
    if (n < 1e39) return (n / 1e36).toFixed(2) + "Ud";
    if (n < 1e42) return (n / 1e39).toFixed(2) + "Dd";
    if (n < 1e45) return (n / 1e42).toFixed(2) + "Td";
    if (n < 1e48) return (n / 1e45).toFixed(2) + "Qad";
    if (n < 1e51) return (n / 1e48).toFixed(2) + "Qid";
    if (n < 1e54) return (n / 1e51).toFixed(2) + "Sxd";
    if (n < 1e57) return (n / 1e54).toFixed(2) + "Spd";
    if (n < 1e60) return (n / 1e57).toFixed(2) + "Ocd";
    if (n < 1e63) return (n / 1e60).toFixed(2) + "Nod";
    if (n < 1e66) return (n / 1e63).toFixed(2) + "Vg";
    return (n / 1e66).toFixed(2) + "Vg+";
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
    if (h > 0) return h + "h " + (m % 60) + "m";
    if (m > 0) return m + "m " + (s % 60) + "s";
    return s + "s";
  }

  function updateUI() {
    document.getElementById("credit-count").textContent = fmt(G.coins);
    document.getElementById("st-cps").textContent = fmt(getTotalCPS());
    document.getElementById("st-tap").textContent = fmt(getTap());
    document.getElementById("st-prestige").textContent = G.prestige;
    document.getElementById("st-quantum").textContent = G.quantum;
  }

  // ═══════════════════════════════════════════
  //  TAP HANDLER
  // ═══════════════════════════════════════════
  const tapZone = document.getElementById("tap-zone");
  const tapCore = document.getElementById("tap-core");
  tapZone.addEventListener("click", (e) => {
    if (interactionLocked) return;
    initAudio();
    const amt = getTap();
    G.coins += amt;
    G.totalClicks++;
    G.totalEarned += amt;
    recentTaps.push(performance.now());
    
    playTapSound();
    if (S.pconf) {
      const flash = document.createElement("div"); flash.className = "tap-flash"; tapCore.appendChild(flash);
      setTimeout(() => flash.remove(), 400);
      const txt = document.createElement("div"); txt.textContent = "+" + fmt(amt);
      txt.style.cssText = `position:absolute;left:${e.clientX}px;top:${e.clientY}px;color:var(--c3);font-size:14px;pointer-events:none;z-index:999;animation:floatUp 1s ease-out forwards;`;
      document.body.appendChild(txt);
      setTimeout(() => txt.remove(), 1000);
    }
    if (S.particles) spawnParticles(e.clientX, e.clientY);
  });

  // ═══════════════════════════════════════════
  //  PARTICLES
  // ═══════════════════════════════════════════
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  const particles = [];
  function spawnParticles(x, y) {
    for (let i = 0; i < 3; i++) particles.push({ x, y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 - 1, life: 1, size: Math.random() * 3 + 2 });
  }
  function updateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.life; ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--c1"); ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(updateParticles);
  }
  if (S.particles) updateParticles();

  // ═══════════════════════════════════════════
  //  SMOOTH GAME LOOP (RequestAnimationFrame)
  // ═══════════════════════════════════════════
  let lastFrameTime = performance.now();
  function gameLoop(time) {
    const delta = time - lastFrameTime;
    lastFrameTime = time;
    const clampedDelta = Math.min(delta, 1000); // Prevent huge offline jumps if tab slept

    if (cheatInfiniteCoins) {
      G.coins = 1e99;
    } else {
      const passive = getPassiveCPS();
      const earned = (passive * clampedDelta) / 1000;
      G.coins += earned;
      G.totalEarned += earned;
    }
    updateUI();
    requestAnimationFrame(gameLoop);
  }
  requestAnimationFrame(gameLoop);

  // ═══════════════════════════════════════════
  //  TABS & UI RENDERERS
  // ═══════════════════════════════════════════
  // Buy mode toggle setup
  document.querySelectorAll(".buy-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".buy-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      buyAmount = btn.dataset.amt;
      if (activeTab === "pps") renderPPS();
      if (activeTab === "ppc") renderPPC();
    };
  });

  function switchTab(tab) {
    const contentEl = document.getElementById("drawer-content");
    const buyControls = document.getElementById("buy-controls");

    if (activeTab === tab && drawerOpen) {
      drawerOpen = false;
      document.querySelectorAll(".drawer-tab").forEach(t => t.classList.remove("active"));
      contentEl.style.display = "none";
      buyControls.style.display = "none";
      return;
    }
    drawerOpen = true; activeTab = tab; contentEl.style.display = "";
    document.querySelectorAll(".drawer-tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + tab).classList.add("active");

    if (tab === "pps" || tab === "ppc") buyControls.style.display = "flex";
    else buyControls.style.display = "none";

    if (tab === "pps") renderPPS();
    else if (tab === "ppc") renderPPC();
    else if (tab === "offline") renderOffline();
    else if (tab === "quantum") renderQuantum();
    else if (tab === "stats") renderStats();
    else if (tab === "settings") renderSettings();
  }

  function getPPSForLevel(u, level) {
    return u.basePPS * Math.pow(1.15, level) * getMilestoneMult(level);
  }

  function renderPPS() {
    const content = document.getElementById("drawer-content");
    content.innerHTML = '<div id="up-list"></div>';
    const list = document.getElementById("up-list");
    
    PPS.forEach(u => {
      const baseCost = u.baseCost;
      const isMaxed = u.owned >= MAX_LEVEL;
      
      let amt = buyAmount === "max" ? calcMaxAffordable(baseCost, u.owned, G.coins) : parseInt(buyAmount);
      if (amt === 0 && buyAmount === "max") amt = 1; // Fallback to show cost of 1
      
      // Cap amount to max level
      if (u.owned + amt > MAX_LEVEL) {
        amt = MAX_LEVEL - u.owned;
      }
      
      const cost = isMaxed ? 0 : calcBulkCost(baseCost, u.owned, amt);
      const canBuy = !isMaxed && (G.coins >= cost || cheatFreeBuy);

      const currentTotal = getPPSForLevel(u, u.owned) * u.owned;
      const nextTotal = getPPSForLevel(u, u.owned + amt) * (u.owned + amt);
      const increase = nextTotal - currentTotal;

      const card = document.createElement("div");
      card.className = "up-card" + (isMaxed ? " maxed" : (canBuy ? "" : " locked"));
      card.innerHTML = `
        <div class="up-icon">${u.icon}</div>
        <div class="up-info">
          <div class="up-name">${u.name} ${isMaxed ? '<span style="color:var(--c3)">MAX</span>' : ''}</div>
          <div class="up-desc">${u.desc}</div>
          <div class="up-effect">${isMaxed ? 'Maxed Out!' : '+' + fmt(increase) + '/s'}</div>
        </div>
        <div class="up-buy">
          <div class="up-cost">${isMaxed ? 'MAX' : fmt(cost)}</div>
          <div class="up-owned">Owned: ${u.owned}/${MAX_LEVEL} ${amt > 1 && !isMaxed ? `<span style="color:var(--c3)">+${amt}</span>` : ""}</div>
        </div>`;
      
      if (canBuy && !isMaxed) {
        card.onclick = () => {
          if (G.coins >= cost || cheatFreeBuy) {
            if (!cheatFreeBuy) G.coins -= cost;
            u.owned += amt;
            renderPPS(); playUpgradeSound(); saveGame();
          }
        };
      }
      list.appendChild(card);
    });
  }

  function applySettingsListeners() {
    const togDark = document.getElementById("tog-dark"), togPart = document.getElementById("tog-part");
    const togPconf = document.getElementById("tog-pconf"), togSound = document.getElementById("tog-sound");
    const togAuto = document.getElementById("tog-autosave"), saveInt = document.getElementById("save-interval-input");
    const wipeBtn = document.getElementById("wipe-data-btn");

    if (togDark) togDark.onclick = () => { S.darkMode = !S.darkMode; document.documentElement.classList.toggle("light-mode", !S.darkMode); togDark.classList.toggle("on", S.darkMode); applyTheme(S.theme); };
    if (togPart) togPart.onclick = () => { S.particles = !S.particles; togPart.classList.toggle("on", S.particles); saveGame(); };
    if (togPconf) togPconf.onclick = () => { S.pconf = !S.pconf; togPconf.classList.toggle("on", S.pconf); saveGame(); };
    if (togSound) togSound.onclick = () => { S.soundFx = !S.soundFx; togSound.classList.toggle("on", S.soundFx); saveGame(); showToast(`Sound FX: ${S.soundFx ? "ON" : "OFF"}`); };
    if (togAuto) togAuto.onclick = () => { S.autoSave = !S.autoSave; togAuto.classList.toggle("on", S.autoSave); saveGame(); showToast(`Auto-Save: ${S.autoSave ? "ON" : "OFF"}`); setupAutoSave(); };
    if (saveInt) saveInt.addEventListener("change", (e) => { const val = parseInt(e.target.value); if (val >= 5 && val <= 300) { S.saveInterval = val; saveGame(); setupAutoSave(); showToast(`Save interval: ${val}s`); } });
    if (wipeBtn) wipeBtn.onclick = () => { if (confirm("⚠️ WIPE ALL DATA? This cannot be undone!")) { localStorage.removeItem("nexus_v5"); location.reload(); } };

    document.querySelectorAll(".theme-quick-btn").forEach(btn => {
      btn.onclick = () => {
        const theme = btn.dataset.theme; applyTheme(theme); updateThemeButtons();
        if (theme === "crimson") {
          crimsonClickCount++;
          if (crimsonClickCount >= 5 && !adminMenuUnlocked) { adminMenuUnlocked = true; document.getElementById("cheat-wrap").style.display = "block"; showToast("⚡ ADMIN MENU UNLOCKED", 3000); saveGame(); }

    updateThemeButtons();
  }

  function doPrestige() {
    if (G.coins < prestigeThresh()) return;
    const gain = calcPrestigeGain();
    G.prestige += gain; G.prestigeCoins += gain; G.coins = 0; G.totalClicks = 0;
    PPS.forEach(u => u.owned = 0); PPC.forEach(u => u.owned = 0);
    switchTab("pps"); playPrestigeSound(); saveGame(); showToast(`PRESTIGE +${gain}`, 3000);
  }
  function doQuantumReset() {
    if (G.coins < quantumThresh()) return;
    const gain = calcQuantumGain();
    G.quantum++; G.quantumPoints += gain; G.coins = 0; G.totalClicks = 0; G.prestige = 0; G.prestigeCoins = 0;
    PPS.forEach(u => u.owned = 0); PPC.forEach(u => u.owned = 0); OFFLINE.forEach(o => o.owned = false);
    switchTab("quantum"); playPrestigeSound(); saveGame(); showToast(`QUANTUM RESET +${gain} QP`, 3000);
  }
