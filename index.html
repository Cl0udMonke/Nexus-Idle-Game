<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEXUS // IDLE</title>
<style>
:root{
  --cyan:#00f5ff; --cyan2:#00bcd4; --neon:#39ff14; --pink:#ff006e; --gold:#ffd60a; --dim:rgba(0,245,255,0.08); --border:rgba(0,245,255,0.18); --bg:#020810;
}
body{margin:0; padding:0; background:var(--bg); font-family:monospace; color:#fff; overflow:hidden; height:100vh; display:flex; flex-direction:column;}
#header{padding:20px; border-bottom:1px solid var(--border);}
#credit-count{font-size:32px;}
#core-area{flex:1; display:flex; justify-content:center; align-items:center; position:relative; transition: all 0.3s;}
#core-btn{width:120px; height:120px; border-radius:50%; border:2px solid var(--cyan); background:radial-gradient(circle at 40% 35%, rgba(0,245,255,0.2), rgba(0,245,255,0.04)); cursor:pointer; display:flex; flex-direction:column; justify-content:center; align-items:center; user-select:none;}
#core-btn:active{transform:scale(0.95);}
.tab-section{position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.4); border-top:1px solid var(--border); transition: max-height 0.3s; overflow:hidden; max-height:0;}
.tab-section.open{max-height:300px;}
.tab-header{padding:5px 10px; cursor:pointer; border-bottom:1px solid var(--border); user-select:none;}
.tab-content{padding:5px 10px;}
.upg-row{padding:5px; border:1px solid var(--border); margin-bottom:4px; display:flex; justify-content:space-between; cursor:pointer;}
</style>
</head>
<body>
<div id="header">
  <div id="credit-count">0</div>
  <div style="margin-top:5px;">Credits</div>
</div>

<div id="core-area">
  <button id="core-btn">
    ⚡<br>GENERATE
  </button>

  <!-- Upgrades Tab -->
  <div id="upgrades-section" class="tab-section">
    <div class="tab-header">UPGRADES</div>
    <div class="tab-content">
      Bulk Buy: <select id="bulk-select"><option value="1">1</option><option value="10">10</option><option value="25">25</option><option value="50">50</option><option value="100">100</option></select>
      <div id="upgrades-list"></div>
    </div>
  </div>

  <!-- Settings Tab -->
  <div id="settings-section" class="tab-section">
    <div class="tab-header">SETTINGS</div>
    <div class="tab-content">
      Theme: <select id="theme-select">
        <option value="theme1">Default</option>
        <option value="theme2">Sunset</option>
        <option value="theme3">Neon</option>
        <option value="theme4">Cosmic</option>
        <option value="theme5">Monochrome</option>
      </select>
    </div>
  </div>
</div>

<script>
let credits = 0, cps = 0, cpt = 1, total = 0;
const coreBtn = document.getElementById('core-btn');
const creditCount = document.getElementById('credit-count');
const upgradesSection = document.getElementById('upgrades-section');
const settingsSection = document.getElementById('settings-section');
const upgradesList = document.getElementById('upgrades-list');
const bulkSelect = document.getElementById('bulk-select');
const themeSelect = document.getElementById('theme-select');

// Example upgrades
let upgrades = [
  {name:'Auto Miner', cost:50, cps:1, owned:0},
  {name:'Quantum Drill', cost:250, cps:5, owned:0},
  {name:'Nano Factory', cost:1000, cps:25, owned:0},
];

// Render upgrades
function renderUpgrades(){
  upgradesList.innerHTML='';
  let bulk = parseInt(bulkSelect.value);
  upgrades.forEach((u,i)=>{
    let canBuy = credits >= u.cost*bulk;
    let row = document.createElement('div');
    row.className = 'upg-row';
    row.style.opacity = canBuy?1:0.4;
    row.innerHTML = `<span>${u.name} (${u.owned})</span><span>${u.cost*bulk}💎</span>`;
    row.onclick = ()=>{
      if(credits>=u.cost*bulk){
        u.owned+=bulk;
        credits-=u.cost*bulk;
        cps+=u.cps*bulk;
        renderUpgrades();
        updateCredits();
      }
    }
    upgradesList.appendChild(row);
  });
}

// Update credits
function updateCredits(){ creditCount.innerText = Math.floor(credits); total+=0; }

// Core button tap
coreBtn.addEventListener('click', ()=>{
  credits+=cpt;
  updateCredits();
});

// Auto CPS loop
setInterval(()=>{
  credits+=cps/10;
  updateCredits();
},100);

// Toggle collapsible
document.querySelectorAll('.tab-header').forEach(header=>{
  header.addEventListener('click',()=>{
    let parent = header.parentElement;
    parent.classList.toggle('open');
  });
});

// Bulk select change
bulkSelect.addEventListener('change', renderUpgrades);

// Theme select
themeSelect.addEventListener('change',(e)=>{
  document.body.className = e.target.value;
});

// Initial render
renderUpgrades();
updateCredits();
</script>
</body>
</html>
