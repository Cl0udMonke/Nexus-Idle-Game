<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Idle Game + Auto-Save + Dynamic Bulk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
:root{
  --c1:#00ffff;
  --c3:#ff00ff;
  --c6:#ffff00;
  --dim:#111;
}
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:'Orbitron',monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  padding:20px;
  overflow-x:hidden;
}
#tap-zone{
  width:220px;
  height:220px;
  background:#222;
  border:4px solid var(--c1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  cursor:pointer;
  user-select:none;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}
#credits,#prestige-points,#stats{font-size:20px;margin-bottom:8px;}
.btn{
  padding:10px;
  border-radius:4px;
  background:var(--dim);
  border:1px solid var(--c1);
  color:var(--c1);
  margin:4px;
  cursor:pointer;
  font-family:'Orbitron',monospace;
}
.upg-row{
  display:flex;
  align-items:flex-start;
  padding:6px;
  border:1px solid var(--c1);
  border-radius:4px;
  cursor:pointer;
}
.upg-row.can:hover{background:#222;}
.upg-row .upg-icon{font-size:24px;margin-right:6px;}
.upg-info{flex:1;}
.upg-top{display:flex;justify-content:space-between;font-weight:bold;}
.upg-bottom{display:flex;justify-content:space-between;font-size:12px;margin-top:2px;}
.float-num{
  position:absolute;
  color:#0ff;
  font-weight:bold;
  pointer-events:none;
  animation:floatUp 1s forwards;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-80px) scale(1.3);opacity:0;}
}
</style>
</head>
<body>

<div id="credits">Credits: 0</div>
<div id="prestige-points">Prestige Points: 0</div>
<div id="stats">
  Total Clicks: 0 | Passive Earned: 0 | Total Prestiges: 0
</div>
<div id="tap-zone">💥</div>
<button class="btn" id="open-upgrades">Upgrades</button>
<button class="btn" id="open-prestige">Prestige</button>

<!-- Upgrades Modal -->
<div id="upgrades-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;z-index:15;">
  <div style="flex:1;overflow-y:auto;padding:16px;">
    <h3 style="color:var(--c1);margin-bottom:12px;">UPGRADES</h3>
    <div style="margin-bottom:12px;">
      <span>Buy ×</span>
      <button class="btn" onclick="setBulkBuy(1)">1</button>
      <button class="btn" onclick="setBulkBuy(10)">10</button>
      <button class="btn" onclick="setBulkBuy(25)">25</button>
      <button class="btn" onclick="setBulkBuy('max')">MAX</button>
    </div>
    <div style="margin-bottom:20px;">
      <h4 style="color:var(--c3);margin-bottom:6px;">PASSIVE</h4>
      <div id="modal-pps-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
    <div>
      <h4 style="color:var(--c6);margin-bottom:6px;">CLICKER</h4>
      <div id="modal-ppc-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>
  <button id="upgrades-close" class="btn" style="margin:12px;">CLOSE</button>
</div>

<!-- Prestige Modal -->
<div id="prestige-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;z-index:15;">
  <div style="flex:1;overflow-y:auto;padding:16px;">
    <h3 style="color:var(--c1);margin-bottom:12px;">PRESTIGE</h3>
    <p>Prestige resets credits and upgrades, but grants Prestige Points based on total credits.</p>
    <p>Current Prestige Points: <span id="prestige-count">0</span></p>
    <button class="btn" onclick="doPrestige()">Prestige Now</button>
    <h4 style="color:var(--c3);margin-top:12px;">Spend Prestige Points</h4>
    <div id="prestige-upgrades" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>
  <button id="prestige-close" class="btn" style="margin:12px;">CLOSE</button>
</div>

<script>
// ----- Game Variables -----
let game = JSON.parse(localStorage.getItem('nexusSave')) || {
  totalCredits:0,
  prestigePoints:0,
  totalClicks:0,
  totalPassiveEarned:0,
  totalPrestiges:0,
  PPS:[
    {name:'Auto Miner',desc:'Generates 0.1/sec',emoji:'⛏️',baseCost:10,baseProd:0.1,owned:0},
    {name:'Factory',desc:'Generates 1/sec',emoji:'🏭',baseCost:100,baseProd:1,owned:0},
    {name:'Mega Lab',desc:'Generates 5/sec',emoji:'🔬',baseCost:500,baseProd:5,owned:0}
  ],
  PPC:[
    {name:'Double Click',desc:'Each click gives +1',emoji:'✨',baseCost:50,baseProd:1,owned:0},
    {name:'Hyper Finger',desc:'Each click +5',emoji:'🤏',baseCost:200,baseProd:5,owned:0}
  ],
  PrestigeUpgrades:[
    {name:'+10% PPS',desc:'Boost all passive income by 10%',cost:1,owned:0,effect:()=>{game.PPS.forEach(u=>u.baseProd*=1.1)}},
    {name:'+10% PPC',desc:'Boost all click power by 10%',cost:1,owned:0,effect:()=>{game.PPC.forEach(u=>u.baseProd*=1.1)}}
  ]
};
let bulkBuy = 1;

// ----- Display Updates -----
function updateDisplay(){
  document.getElementById('credits').textContent='Credits: '+game.totalCredits.toFixed(2);
  document.getElementById('prestige-points').textContent='Prestige Points: '+game.prestigePoints;
  document.getElementById('prestige-count').textContent=game.prestigePoints;
  document.getElementById('stats').textContent=`Total Clicks: ${game.totalClicks} | Passive Earned: ${game.totalPassiveEarned.toFixed(2)} | Total Prestiges: ${game.totalPrestiges}`;
  saveGame();
}

// ----- Save -----
function saveGame(){localStorage.setItem('nexusSave',JSON.stringify(game));}

// ----- Floating Numbers -----
function floatNumber(x,y,val){
  const span=document.createElement('span');
  span.className='float-num';
  span.style.left=(x-10)+'px';
  span.style.top=(y-20)+'px';
  span.textContent='+'+val.toFixed(2);
  document.getElementById('tap-zone').appendChild(span);
  setTimeout(()=>span.remove(),1000);
}

// ----- Click Event -----
document.getElementById('tap-zone').addEventListener('click',e=>{
  let clickPower = 1;
  game.PPC.forEach(u=>{clickPower+=u.baseProd*u.owned;});
  game.totalCredits+=clickPower;
  game.totalClicks++;
  updateDisplay();
  floatNumber(e.offsetX,e.offsetY,clickPower);
});

// ----- Passive Income -----
setInterval(()=>{
  let totalPPS=0;
  game.PPS.forEach(u=>{totalPPS+=u.baseProd*u.owned;});
  let earned = totalPPS/10;
  game.totalCredits+=earned;
  game.totalPassiveEarned+=earned;
  updateDisplay();
},100);

// ----- Upgrades Modal -----
let upgradesModal=document.getElementById('upgrades-modal');
document.getElementById('open-upgrades').addEventListener('click',()=>{upgradesModal.style.display='flex'; renderModalUpgrades();});
document.getElementById('upgrades-close').addEventListener('click',()=>{upgradesModal.style.display='none';});
function setBulkBuy(n){bulkBuy=n; renderModalUpgrades();}

// ----- Render Upgrades -----
function renderModalUpgrades(){
  const ppsList=document.getElementById('modal-pps-list');
  const ppcList=document.getElementById('modal-ppc-list');
  ppsList.innerHTML=''; ppcList.innerHTML='';
  game.PPS.forEach(u=>ppsList.appendChild(createUpgradeRow(u,true)));
  game.PPC.forEach(u=>ppcList.appendChild(createUpgradeRow(u,false)));
}

function createUpgradeRow(u,isPPS){
  const div=document.createElement('div');
  const amount = bulkBuy==='max'?Math.floor(game.totalCredits/u.baseCost):bulkBuy;
  const totalCost = u.baseCost*amount;
  const totalGain = u.baseProd*amount;
  div.className='upg-row '+(game.totalCredits>=totalCost?'can':'cant');
  div.innerHTML=`
    <div class="upg-icon">${u.emoji}</div>
    <div class="upg-info">
      <div class="upg-top"><span>${u.name}</span><span>${u.owned}</span></div>
      <div class="upg-desc">${u.desc}</div>
      <div class="upg-bottom">
        <span>Cost: ${totalCost.toFixed(2)} (${bulkBuy==='max'?'MAX':amount})</span>
        <span>+${totalGain.toFixed(2)}/${isPPS?'sec':'click'}</span>
      </div>
    </div>`;
  div.addEventListener('click',()=>{buyUpgrade(u,isPPS); renderModalUpgrades();});
  return div;
}

function buyUpgrade(u,isPPS){
  let amount = bulkBuy==='max'?Math.floor(game.totalCredits/u.baseCost):bulkBuy;
  let cost = u.baseCost*amount;
  if(game.totalCredits>=cost){
    game.totalCredits-=cost;
    u.owned+=amount;
    updateDisplay();
  }
}

// ----- Prestige Modal -----
let prestigeModal=document.getElementById('prestige-modal');
document.getElementById('open-prestige').addEventListener('click',()=>{prestigeModal.style.display='flex'; renderPrestige();});
document.getElementById('prestige-close').addEventListener('click',()=>{prestigeModal.style.display='none';});

function renderPrestige(){
  const container=document.getElementById('prestige-upgrades');
  container.innerHTML='';
  game.PrestigeUpgrades.forEach(u=>{
    const div=document.createElement('div');
    div.className='upg-row '+(game.prestigePoints>=u.cost?'can':'cant');
    div.innerHTML=`<div class="upg-info">
      <div class="upg-top"><span>${u.name}</span><span>${u.owned}</span></div>
      <div class="upg-desc">${u.desc}</div>
      <div class="upg-bottom"><span>Cost: ${u.cost} PP</span></div>
    </div>`;
    div.addEventListener('click',()=>{
      if(game.prestigePoints>=u.cost){game.prestigePoints-=u.cost; u.owned++; u.effect(); updateDisplay();}
      renderPrestige();
    });
    container.appendChild(div);
  });
}

function doPrestige(){
  let gained = Math.floor(game.totalCredits/1000);
  if(gained>0){
    game.prestigePoints+=gained;
    game.totalCredits=0;
    game.PPS.forEach(u=>u.owned=0);
    game.PPC.forEach(u=>u.owned=0);
    game.totalPrestiges++;
    updateDisplay();
    renderModalUpgrades();
    renderPrestige();
  } else alert('Need at least 1000 credits to prestige.');
}

updateDisplay();
</script>
</body>
</html>
