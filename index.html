<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>NEXUS // IDLE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Share+Tech+Mono&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image.png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="theme-color" content="#00f5ff" id="theme-meta" />
    <style>
      /* ═══════════════════════════════════════════
   FONTS
   ═══════════════════════════════════════════ */
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap");
      * {
        font-family: inherit !important;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      /* ═══════════════════════════════════════════
THEMES — More vibrant/neon colors
═══════════════════════════════════════════ */
      :root {
        –bg: #020810;
        –bg2: #040f1e;
        –c1: #00ffff;
        –c1dim: rgba(0, 255, 255, 0.2);
        –c1glow: rgba(0, 255, 255, 0.5);
        –c2: #00e5ff;
        –c3: #39ff14;
        –c4: #ff0080;
        –c5: #ffee00;
        –c6: #ff6600;
        –border: rgba(0, 255, 255, 0.4);
        –border2: rgba(0, 255, 255, 0.2);
        –txt: #e8f4ff;
        –txt2: #8ab4cc;
        –txt3: #4a7a90;
        –tap-flash: rgba(0, 255, 255, 0.15);
        –grid-c: rgba(0, 255, 255, 0.08);
        –ring1: rgba(0, 255, 255, 0.6);
        –ring2: rgba(57, 255, 20, 0.5);
      }

      :root.light-mode {
        –bg: #f0f4f8;
        –bg2: #ffffff;
        –c1: #0077ff;
        –c1dim: rgba(0, 119, 255, 0.15);
        –c1glow: rgba(0, 119, 255, 0.3);
        –c2: #0066dd;
        –c3: #00cc55;
        –c4: #ff0066;
        –c5: #ff9900;
        –c6: #ff5500;
        –border: rgba(0, 119, 255, 0.35);
        –border2: rgba(0, 119, 255, 0.18);
        –txt: #1a2634;
        –txt2: #3a4a5a;
        –txt3: #6a7a8a;
        –tap-flash: rgba(0, 119, 255, 0.12);
        –grid-c: rgba(0, 119, 255, 0.08);
        –ring1: rgba(0, 119, 255, 0.45);
        –ring2: rgba(0, 204, 85, 0.4);
      }

      /* ===== GLOBAL ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        height: 100%;
        overflow: hidden;
        background: var(–bg);
        font-size: 16px;
      }
      body {
        background: var(–bg);
        font-family:
          ‘Share Tech Mono’,
          monospace;
        color: var(–txt);
        position: fixed;
        width: 100%;
        height: 100%;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* ===== GRID ===== */
      #grid-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(var(–grid-c) 1px, transparent 1px), linear-gradient(90deg, var(–grid-c) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridScroll 22s linear infinite;
      }

      @keyframes gridScroll {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 0 40px;
        }
      }

      /* Corner brackets */
      .corner {
        position: fixed;
        width: 44px;
        height: 44px;
        z-index: 3;
      }
      .corner.tl {
        top: max(0px, env(safe-area-inset-top, 0px));
        left: max(0px, env(safe-area-inset-left, 0px));
        border-top: 2px solid var(–c1);
        border-left: 2px solid var(–c1);
      }
      .corner.tr {
        top: max(0px, env(safe-area-inset-top, 0px));
        right: max(0px, env(safe-area-inset-right, 0px));
        border-top: 2px solid var(–c1);
        border-right: 2px solid var(–c1);
      }
      .corner.bl {
        bottom: max(0px, env(safe-area-inset-bottom, 0px));
        left: max(0px, env(safe-area-inset-left, 0px));
        border-bottom: 2px solid var(–c1);
        border-left: 2px solid var(–c1);
      }
      .corner.br {
        bottom: max(0px, env(safe-area-inset-bottom, 0px));
        right: max(0px, env(safe-area-inset-right, 0px));
        border-bottom: 2px solid var(–c1);
        border-right: 2px solid var(–c1);
      }

      /* Canvas overlay */
      #particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }

      /* ═══════════════════════════════════════════
APP LAYOUT
═══════════════════════════════════════════ */
      #app {
        position: relative;
        z-index: 6;
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
        padding-bottom: max(56px, calc(48px + env(safe-area-inset-bottom, 0px)));
        box-sizing: border-box;
      }

      /* ── HEADER ─────────────────────────────── */
      #header {
        padding-top: calc(20px + env(safe-area-inset-top, 0px));
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
        padding-bottom: 10px;
        background: var(–bg2);
        border-bottom: 1px solid var(–border);
        flex-shrink: 0;
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      #sys-label {
        font-family: ‘Orbitron’, monospace;
        font-size: 8px;
        letter-spacing: 4px;
        color: var(–c1);
        opacity: 0.5;
        margin-bottom: 3px;
      }

      #credit-count {
        font-family: ‘Orbitron’, monospace;
        font-size: clamp(28px, 7vw, 44px);
        font-weight: 900;
        color: var(–c1);
        letter-spacing: 2px;
        line-height: 1;
        text-shadow:
          0 0 18px var(–c1glow),
          0 0 30px var(–c1glow);
      }

      #credit-unit {
        font-size: 9px;
        letter-spacing: 3px;
        color: var(–txt2);
        margin-top: 2px;
      }

      /* ── STAT BOXES ─────────── */
      .stats-row {
        display: flex;
        gap: 5px;
        margin-top: 8px;
        flex-wrap: wrap;
      }

      .stat-box {
        border: 1px solid var(–border2);
        background: var(–c1dim);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 9px;
        color: var(–txt2);
        position: relative;
        overflow: hidden;
        flex: 0 1 auto;
        min-width: 70px;
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      .stat-box .st-lbl {
        opacity: 0.6;
        font-size: 7px;
        letter-spacing: 1px;
        margin-bottom: 1px;
      }
      .stat-box .st-val {
        color: var(–txt);
        font-weight: 700;
        font-size: 10px;
      }

      /* ── TAP ZONE ─────────────────────────────── */
      #tap-zone {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        min-height: 0;
      }

      /* ── TAP CORE (ENHANCED ANIMATION) ─────── */
      #tap-core {
        position: relative;
        width: clamp(180px, 42vw, 280px);
        height: clamp(180px, 42vw, 280px);
        border-radius: 50%;
        border: 3px solid var(–c1);
        background: radial-gradient(circle, var(–c1dim), transparent);
        box-shadow:
          0 0 40px var(–c1glow),
          0 0 80px var(–c1glow);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.08s,
          background 0.3s,
          border-color 0.3s,
          box-shadow 0.3s;
        animation: corePulse 3s ease-in-out infinite;
      }

      @keyframes corePulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow:
            0 0 40px var(–c1glow),
            0 0 80px var(–c1glow);
        }
        50% {
          transform: scale(1.05);
          box-shadow:
            0 0 60px var(–c1glow),
            0 0 120px var(–c1glow);
        }
      }

      #tap-core:active {
        transform: scale(0.95) !important;
      }

      #tap-core-label {
        font-family: ‘Orbitron’, monospace;
        font-size: clamp(11px, 2.8vw, 15px);
        letter-spacing: 3px;
        color: var(–c1);
        text-shadow: 0 0 12px var(–c1glow);
        position: relative;
        z-index: 2;
      }

      /* Outer rings (more prominent) */
      #tap-core::before,
      #tap-core::after {
        content: ’’;
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        pointer-events: none;
        animation: ringPulse 4s ease-in-out infinite;
      }

      #tap-core::before {
        border: 2px solid var(–ring1);
        animation-delay: 0s;
      }

      #tap-core::after {
        border: 2px solid var(–ring2);
        animation-delay: 2s;
      }

      @keyframes ringPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.3;
        }
      }

      /* Tap flash */
      .tap-flash {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: var(–tap-flash);
        opacity: 0;
        pointer-events: none;
        animation: flashFade 0.4s ease-out;
      }

      @keyframes flashFade {
        0% {
          opacity: 0.8;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.3);
        }
      }

      /* ── DRAWER ─────────────────────────────── */
      #drawer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(–bg2);
        border-top: 1px solid var(–border);
        z-index: 20;
        display: flex;
        flex-direction: column;
        padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      #drawer-tabs {
        display: flex;
        border-bottom: 1px solid var(–border2);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .drawer-tab {
        flex: 1;
        min-width: 60px;
        padding: 10px 6px;
        font-size: 9px;
        letter-spacing: 1px;
        background: transparent;
        border: none;
        color: var(–txt3);
        cursor: pointer;
        transition:
          color 0.2s,
          background 0.2s;
      }

      .drawer-tab.active {
        color: var(–c1);
        background: var(–c1dim);
        border-bottom: 2px solid var(–c1);
      }

      .drawer-tab:active {
        opacity: 0.7;
      }

      #drawer-content {
        max-height: 58vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 12px;
      }

      /* ── UPGRADES ─────────────────────────────── */
      #up-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .up-card {
        background: var(–c1dim);
        border: 1px solid var(–border2);
        border-radius: 6px;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.3s,
          transform 0.15s;
      }

      .up-card:active {
        transform: scale(0.98);
      }

      .up-card.locked {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .up-icon {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        background: var(–c1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
        box-shadow: 0 0 15px var(–c1glow);
      }

      .up-info {
        flex-grow: 1;
      }

      .up-name {
        font-family: ‘Orbitron’, monospace;
        font-size: 11px;
        letter-spacing: 1px;
        color: var(–txt);
        margin-bottom: 3px;
      }

      .up-desc {
        font-size: 8px;
        color: var(–txt3);
        line-height: 1.3;
        margin-bottom: 4px;
      }

      .up-effect {
        font-size: 9px;
        color: var(–c3);
        font-weight: 700;
      }

      .up-buy {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
      }

      .up-cost {
        font-family: ‘Orbitron’, monospace;
        font-size: 10px;
        color: var(–c5);
        font-weight: 700;
      }

      .up-owned {
        font-size: 8px;
        color: var(–txt3);
      }

      /* ── PRESTIGE/QUANTUM BUTTONS ─────────── */
      .big-action-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(–c4), var(–c2));
        border: 2px solid var(–c1);
        border-radius: 8px;
        color: var(–txt);
        font-family: ‘Orbitron’, monospace;
        font-size: 13px;
        letter-spacing: 2px;
        cursor: pointer;
        margin-bottom: 10px;
        transition:
          transform 0.15s,
          box-shadow 0.2s;
        box-shadow: 0 0 20px var(–c1glow);
      }

      .big-action-btn:active {
        transform: scale(0.97);
      }

      .big-action-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── OFFLINE UPGRADES ─────────── */
      #offline-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .offline-header {
        font-size: 10px;
        color: var(–txt2);
        margin-bottom: 8px;
        padding: 8px;
        background: var(–c1dim);
        border-radius: 4px;
      }

      /* ── QUANTUM UPGRADES ─────────── */
      .quantum-info {
        background: var(–c1dim);
        border: 1px solid var(–border);
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .quantum-info .qi-row {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        margin-bottom: 6px;
      }

      .quantum-info .qi-label {
        color: var(–txt3);
      }
      .quantum-info .qi-val {
        color: var(–c1);
        font-weight: 700;
      }

      #quantum-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* ── STATS TAB ─────────── */
      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }

      .stat-card {
        background: var(–c1dim);
        border: 1px solid var(–border2);
        border-radius: 6px;
        padding: 10px;
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      .stat-card .sc-lbl {
        font-size: 8px;
        color: var(–txt3);
        letter-spacing: 1px;
        margin-bottom: 4px;
      }

      .stat-card .sc-val {
        font-family: ‘Orbitron’, monospace;
        font-size: 13px;
        color: var(–c1);
        font-weight: 700;
      }

      /* ── SETTINGS TAB ─────────── */
      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(–border2);
      }

      .setting-label {
        font-size: 10px;
        color: var(–txt2);
      }

      .toggle-btn {
        width: 48px;
        height: 24px;
        background: var(–border2);
        border: 1px solid var(–border);
        border-radius: 12px;
        position: relative;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle-btn::after {
        content: ’’;
        position: absolute;
        left: 2px;
        top: 2px;
        width: 18px;
        height: 18px;
        background: var(–txt3);
        border-radius: 50%;
        transition:
          left 0.2s,
          background 0.2s;
      }

      .toggle-btn.on {
        background: var(–c1dim);
      }
      .toggle-btn.on::after {
        left: 26px;
        background: var(–c1);
      }

      .theme-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 10px;
      }

      .theme-quick-btn {
        padding: 10px;
        background: var(–c1dim);
        border: 1px solid var(–border2);
        border-radius: 6px;
        font-size: 9px;
        letter-spacing: 1px;
        color: var(–txt2);
        cursor: pointer;
        transition: all 0.2s;
      }

      .theme-quick-btn.active {
        background: var(–c1);
        color: var(–bg);
        border-color: var(–c1);
        box-shadow: 0 0 15px var(–c1glow);
      }

      .theme-quick-btn:active {
        transform: scale(0.95);
      }

      input[type="“range”"],
      input[type="“number”"] {
        width: 100%;
        padding: 6px;
        background: var(–c1dim);
        border: 1px solid var(–border2);
        border-radius: 4px;
        color: var(–txt);
        font-size: 10px;
      }

      /* ── TOAST ─────────── */
      #toast {
        position: fixed;
        top: calc(20px + env(safe-area-inset-top, 0px));
        left: 50%;
        transform: translateX(-50%);
        background: var(–bg2);
        border: 1px solid var(–c1);
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 10px;
        letter-spacing: 1px;
        color: var(–c1);
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        box-shadow: 0 0 20px var(–c1glow);
      }

      #toast.show {
        opacity: 1;
      }

      /* ── ADMIN MENU ─────────── */
      #cheat-wrap {
        position: fixed;
        top: calc(80px + env(safe-area-inset-top, 0px));
        right: max(12px, env(safe-area-inset-right, 0px));
        z-index: 100;
        display: none;
      }

      #cheat-toggle {
        width: 40px;
        height: 40px;
        background: var(–c4);
        border: 2px solid var(–c1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        transition: transform 0.2s;
      }

      #cheat-toggle:active {
        transform: scale(0.9);
      }

      #cheat-dd {
        position: absolute;
        top: 50px;
        right: 0;
        width: 260px;
        max-height: 0;
        overflow: hidden;
        background: var(–bg2);
        border: 2px solid var(–c4);
        border-radius: 8px;
        transition:
          max-height 0.3s,
          padding 0.3s;
        box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
      }

      #cheat-dd.open {
        max-height: 500px;
        padding: 12px;
      }

      .ch-btn {
        width: 100%;
        padding: 10px;
        margin-bottom: 6px;
        background: var(–c1dim);
        border: 1px solid var(–border);
        border-radius: 4px;
        color: var(–txt);
        font-size: 9px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .ch-btn:active {
        transform: scale(0.97);
      }

      .ch-input-row {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }

      .ch-input-row input {
        flex: 1;
        padding: 8px;
        background: var(–c1dim);
        border: 1px solid var(–border2);
        border-radius: 4px;
        color: var(–txt);
        font-size: 9px;
      }

      .ch-quick-btns {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        margin-bottom: 8px;
      }

      .ch-quick-btns button {
        padding: 8px;
        font-size: 8px;
      }

      /* ── PARTICLES ─────────── */
      @keyframes particle {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(–tx), var(–ty)) scale(0);
          opacity: 0;
        }
      }

      /* ── UTILITY ─────────── */
      .mb-8 {
        margin-bottom: 8px;
      }
      .mt-8 {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <canvas id="particles"></canvas>

    <!-- Admin Menu — dynamically injected via JS only when unlocked -->

    <div id="app">
      <!-- HEADER -->
      <div id="header">
        <div id="sys-label">NEXUS</div>
        <div id="credit-count">0</div>
        <div id="credit-unit">CREDITS</div>
        <div class="stats-row">
          <div class="stat-box">
            <div class="st-lbl">CPS</div>
            <div class="st-val" id="st-cps">0</div>
          </div>
          <div class="stat-box">
            <div class="st-lbl">TAP</div>
            <div class="st-val" id="st-tap">1</div>
          </div>
          <div class="stat-box">
            <div class="st-lbl">PRESTIGE</div>
            <div class="st-val" id="st-prestige">0</div>
          </div>
          <div class="stat-box">
            <div class="st-lbl">QUANTUM</div>
            <div class="st-val" id="st-quantum">0</div>
          </div>
        </div>
      </div>

      <!-- TAP ZONE -->

      <div id="tap-zone">
        <div id="tap-core">

      function playTapSound() {
        if (!S.soundFx || !audioCtx) return;
        try {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 800;
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.1);
        } catch (e) {}
      }

      // ═══════════════════════════════════════════
      //  CALCULATIONS
      // ═══════════════════════════════════════════
      function prestigeMult() {
        return 1 + G.prestige * 0.1;
      }

      function quantumMult() {
        let m = 1;
        QUANTUM.forEach((q) => {
          if (q.mult) m += q.mult * q.owned;
        });
        return m;
      }

      function prestigeBoost() {
        let b = 1;
        QUANTUM.forEach((q) => {
          if (q.pMult) b += q.pMult * q.owned;
        });
        return b;
      }

      function clickMult() {
        let m = 1;
        QUANTUM.forEach((q) => {
          if (q.clickMult && q.owned > 0) m *= Math.pow(q.clickMult, q.owned);
        });
        return m;
      }

      function getCPS() {
        let cps = 0;
        PPS.forEach((u) => {
          const pps = u.basePPS * Math.pow(1.15, u.owned);
          cps += pps * u.owned;
        });
        return cps * prestigeMult() * quantumMult();
      }

      function getTap() {
        let tap = 1;
        PPC.forEach((u) => {
          const ppc = u.basePPC * Math.pow(1.15, u.owned);
          tap += ppc * u.owned;
        });
        return tap * prestigeMult() * quantumMult() * clickMult();
      }

      function getOfflineRate() {
        let rate = 0;
        OFFLINE.forEach((o) => {
          if (o.owned && o.bonus) rate = Math.max(rate, o.bonus);
        });
        return rate;
      }

      function getOfflineTime() {
        let base = 1800; // 30 min base
        OFFLINE.forEach((o) => {
          if (o.owned && o.time) base += o.time;
        });
        return base;
      }

      function calcUpgradeCost(base, owned) {
        return Math.floor(base * Math.pow(1.15, owned));
      }

      function prestigeThresh() {
        return 100000 * Math.pow(10, G.prestige);
      }

      function quantumThresh() {
        return 1e9 * Math.pow(100, G.quantum);
      }

      function calcPrestigeGain() {
        if (G.coins < prestigeThresh()) return 0;
        const raw = Math.floor(Math.log10(G.coins / 100000));
        return Math.max(1, Math.floor(raw * prestigeBoost()));
      }

      function calcQuantumGain() {
        if (G.coins < quantumThresh()) return 0;
        return Math.max(1, Math.floor(Math.log10(G.coins / 1e9)));
      }

      // ═══════════════════════════════════════════
      //  SAVE / LOAD
      // ═══════════════════════════════════════════
      function saveGame() {
        const data = {
          G,
          S,
          PPS: PPS.map((u) => u.owned),
          PPC: PPC.map((u) => u.owned),
          OFFLINE: OFFLINE.map((o) => o.owned),
          QUANTUM: QUANTUM.map((q) => q.owned),
          adminMenuUnlocked,
        };
        localStorage.setItem("nexus_v5", JSON.stringify(data));
      }

      // Safely assign only known keys with type validation (prevents prototype pollution)
      function safeAssign(target, source, schema) {
        if (!source || typeof source !== "object" || Array.isArray(source)) return;
        for (const key of Object.keys(schema)) {
          if (!Object.prototype.hasOwnProperty.call(source, key)) continue;
          const val = source[key];
          const expectedType = schema[key];
          if (typeof val === expectedType && Number.isFinite(val)) {
            target[key] = val;
          } else if (expectedType === "boolean" && typeof val === "boolean") {
            target[key] = val;
          } else if (expectedType === "string" && typeof val === "string" && val.length < 64) {
            target[key] = val;
          }
        }
      }

      function loadGame() {
        const raw = localStorage.getItem("nexus_v5");
        if (!raw) return;
        try {
          const data = JSON.parse(raw);

          // Whitelist-based loading to prevent prototype pollution
          safeAssign(G, data.G, {
            coins: "number",
            totalClicks: "number",
            totalEarned: "number",
            prestige: "number",
            prestigeCoins: "number",
            quantum: "number",
            quantumPoints: "number",
            lastSave: "number",
            startTime: "number",
          });

          safeAssign(S, data.S, {
            darkMode: "boolean",
            particles: "boolean",
            pconf: "boolean",
            soundFx: "boolean",
            autoSave: "boolean",
            saveInterval: "number",
            theme: "string",
          });

          // Validate theme against known themes
          if (!THEMES[S.theme]) S.theme = "nexus";

          // Validate saveInterval bounds
          if (S.saveInterval < 5 || S.saveInterval > 300) S.saveInterval = 30;

          if (Array.isArray(data.PPS)) PPS.forEach((u, i) => {
            const v = Number(data.PPS[i]);
            u.owned = (Number.isFinite(v) && v >= 0) ? Math.floor(v) : 0;
          });
          if (Array.isArray(data.PPC)) PPC.forEach((u, i) => {
            const v = Number(data.PPC[i]);
            u.owned = (Number.isFinite(v) && v >= 0) ? Math.floor(v) : 0;
          });
          if (Array.isArray(data.OFFLINE)) OFFLINE.forEach((o, i) => {
            o.owned = data.OFFLINE[i] === true;
          });
          if (Array.isArray(data.QUANTUM)) QUANTUM.forEach((q, i) => {
            const v = Number(data.QUANTUM[i]);
            q.owned = (Number.isFinite(v) && v >= 0) ? Math.floor(v) : 0;
          });
          adminMenuUnlocked = data.adminMenuUnlocked === true;
          if (adminMenuUnlocked) {
            buildAdminMenu();
          }
          processOfflineEarnings();
        } catch (e) {
          console.error("Load failed", e);
        }
      }

      function processOfflineEarnings() {
        const now = Date.now();
        const elapsed = Math.floor((now - G.lastSave) / 1000);
        if (elapsed < 10) return;
        const maxOffline = getOfflineTime();
        const offlineRate = getOfflineRate();
        const capElapsed = Math.min(elapsed, maxOffline);
        const cps = getCPS();
        const earned = cps * capElapsed * offlineRate;
        if (earned > 0) {
          G.coins += earned;
          G.totalEarned += earned;
          showOfflineToast(earned, capElapsed, elapsed > maxOffline);
        }
        G.lastSave = now;
      }

      function setupAutoSave() {
        if (autoSaveTimer) clearInterval(autoSaveTimer);
        if (S.autoSave) {
          autoSaveTimer = setInterval(() => {
            G.lastSave = Date.now();
            saveGame();
          }, S.saveInterval * 1000);
        }
      }

      // ═══════════════════════════════════════════
      //  SAFE DOM HELPERS (prevent XSS via innerHTML)
      // ═══════════════════════════════════════════
      function el(tag, attrs, children) {
        const node = document.createElement(tag);
        if (attrs) {
          for (const [k, v] of Object.entries(attrs)) {
            if (k === "className") node.className = v;
            else if (k === "textContent") node.textContent = v;
            else if (k === "style") node.style.cssText = v;
            else if (k === "disabled") { if (v) node.disabled = true; }
            else if (k.startsWith("data-")) node.setAttribute(k, v);
            else node.setAttribute(k, v);
          }
        }
        if (children) {
          for (const c of Array.isArray(children) ? children : [children]) {
            if (typeof c === "string") node.appendChild(document.createTextNode(c));
            else if (c) node.appendChild(c);
          }
        }
        return node;
      }

      function buildUpgradeCard(icon, name, desc, effectText, costText, ownedText, canBuy, onClick) {
        const card = el("div", { className: "up-card" + (canBuy ? "" : " locked") }, [
          el("div", { className: "up-icon", textContent: icon }),
          el("div", { className: "up-info" }, [
            el("div", { className: "up-name", textContent: name }),
            el("div", { className: "up-desc", textContent: desc }),
            effectText ? el("div", { className: "up-effect", textContent: effectText }) : null,
          ]),
          el("div", { className: "up-buy" }, [
            el("div", { className: "up-cost", textContent: costText }),
            ownedText ? el("div", { className: "up-owned", textContent: ownedText }) : null,
          ]),
        ]);
        if (canBuy && onClick) card.onclick = onClick;
        return card;
      }

      // ═══════════════════════════════════════════
      //  UI UPDATE
      // ═══════════════════════════════════════════
      function fmt(n) {
        if (n < 1000) return Math.floor(n).toString();
        if (n < 1e6) return (n / 1e3).toFixed(1) + "K";
        if (n < 1e9) return (n / 1e6).toFixed(2) + "M";
        if (n < 1e12) return (n / 1e9).toFixed(2) + "B";
        if (n < 1e15) return (n / 1e12).toFixed(2) + "T";
        return (n / 1e15).toFixed(2) + "Q";
      }

      function fmtTime(ms) {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        const h = Math.floor(m / 60);
        if (h > 0) return h + "h " + (m % 60) + "m";
        if (m > 0) return m + "m " + (s % 60) + "s";
        return s + "s";
      }

      function updateUI() {
        document.getElementById("credit-count").textContent = fmt(G.coins);
        document.getElementById("st-cps").textContent = fmt(getCPS());
        document.getElementById("st-tap").textContent = fmt(getTap());
        document.getElementById("st-prestige").textContent = G.prestige;
        document.getElementById("st-quantum").textContent = G.quantum;
      }

      // ═══════════════════════════════════════════
      //  TAP HANDLER
      // ═══════════════════════════════════════════
      const tapCore = document.getElementById("tap-core");
      tapCore.addEventListener("click", (e) => {
        if (interactionLocked) return;
        initAudio();
        const amt = getTap();
        G.coins += amt;
        G.totalClicks++;
        G.totalEarned += amt;
        updateUI();
        playTapSound();
        if (S.pconf) {
          const flash = document.createElement("div");
          flash.className = "tap-flash";
          tapCore.appendChild(flash);
          setTimeout(() => flash.remove(), 400);
          const txt = document.createElement("div");
          txt.textContent = "+" + fmt(amt);
          txt.style.cssText = `position:absolute;left:${e.clientX}px;top:${e.clientY}px;color:var(--c3);font-size:14px;pointer-events:none;z-index:999;animation:floatUp 1s ease-out forwards;`;
          document.body.appendChild(txt);
          setTimeout(() => txt.remove(), 1000);
        }
        if (S.particles) spawnParticles(e.clientX, e.clientY);
      });

      const style = document.createElement("style");
      style.textContent = `@keyframes floatUp{to{transform:translateY(-60px);opacity:0;}}`;
      document.head.appendChild(style);

      // ═══════════════════════════════════════════
      //  PARTICLES
      // ═══════════════════════════════════════════
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      const particles = [];

      function spawnParticles(x, y) {
        for (let i = 0; i < 3; i++) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3 - 1,
            life: 1,
            size: Math.random() * 3 + 2,
          });
        }
      }

      function updateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.life -= 0.02;
          if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = p.life;
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--c1");
          ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(updateParticles);
      }

      if (S.particles) updateParticles();

      // ═══════════════════════════════════════════
      //  GAME LOOP
      // ═══════════════════════════════════════════
      setInterval(() => {
        if (cheatInfiniteCoins) {
          G.coins = 1e99;
        } else {
          const cps = getCPS();
          G.coins += cps / 10;
          G.totalEarned += cps / 10;

        updateUI();

      // ═══════════════════════════════════════════
      //  TABS
      // ═══════════════════════════════════════════
      function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll(".drawer-tab").forEach((t) => t.classList.remove("active"));
        document.getElementById("tab-" + tab).classList.add("active");
        const content = document.getElementById("drawer-content");
        if (tab === "pps") renderPPS();
        else if (tab === "ppc") renderPPC();
        else if (tab === "offline") renderOffline();
        else if (tab === "quantum") renderQuantum();
        else if (tab === "stats") renderStats();
        else if (tab === "settings") renderSettings();
      }

      function renderPPS() {
        const content = document.getElementById("drawer-content");
        content.textContent = "";
        const list = el("div", { id: "up-list" });
        content.appendChild(list);
        PPS.forEach((u) => {
          const cost = calcUpgradeCost(u.baseCost, u.owned);
          const canBuy = G.coins >= cost || cheatFreeBuy;
          const ppsPerLevel = u.basePPS * Math.pow(1.15, u.owned);
          const nextPPS = u.basePPS * Math.pow(1.15, u.owned + 1);
          const increase = nextPPS - ppsPerLevel;
          const card = buildUpgradeCard(
            u.icon, u.name, u.desc,
            "+" + fmt(increase) + "/s per level",
            fmt(cost), "Owned: " + u.owned, canBuy,
            () => {
              if (G.coins >= cost || cheatFreeBuy) {
                if (!cheatFreeBuy) G.coins -= cost;
                u.owned++;
                updateUI();
                renderPPS();
                playUpgradeSound();
                saveGame();
              }
            }
          );
          list.appendChild(card);
        });
      }

      function renderPPC() {
        const content = document.getElementById("drawer-content");
        content.textContent = "";
        const list = el("div", { id: "up-list" });
        content.appendChild(list);
        PPC.forEach((u) => {
          const cost = calcUpgradeCost(u.baseCost, u.owned);
          const canBuy = G.coins >= cost || cheatFreeBuy;
          const ppcPerLevel = u.basePPC * Math.pow(1.15, u.owned);
          const nextPPC = u.basePPC * Math.pow(1.15, u.owned + 1);
          const increase = nextPPC - ppcPerLevel;
          const card = buildUpgradeCard(
            u.icon, u.name, u.desc,
            "+" + fmt(increase) + " per tap",
            fmt(cost), "Owned: " + u.owned, canBuy,
            () => {
              if (G.coins >= cost || cheatFreeBuy) {
                if (!cheatFreeBuy) G.coins -= cost;
                u.owned++;
                updateUI();
                renderPPC();
                playUpgradeSound();
                saveGame();
              }
            }
          );
          list.appendChild(card);
        });
      }

      function renderOffline() {
        const content = document.getElementById("drawer-content");
        content.textContent = "";
        const maxTime = getOfflineTime();
        const maxTimeStr = fmtTime(maxTime * 1000);
        const header = el("div", { className: "offline-header" }, [
          "Max Offline Time: " + maxTimeStr,
          document.createElement("br"),
          "Current Offline Rate: " + (getOfflineRate() * 100).toFixed(0) + "%",
        ]);
        const list = el("div", { id: "offline-list" });
        content.appendChild(header);
        content.appendChild(list);
        OFFLINE.forEach((o) => {
          const canBuy =
            (G.coins >= o.cost || cheatFreeBuy) && !o.owned && (!o.req || OFFLINE.find((x) => x.id === o.req).owned);
          const card = buildUpgradeCard(
            o.icon, o.name, o.desc, null,
            o.owned ? "OWNED" : fmt(o.cost), null,
            canBuy && !o.owned,
            () => {
              if (G.coins >= o.cost || cheatFreeBuy) {
                if (!cheatFreeBuy) G.coins -= o.cost;
                o.owned = true;
                updateUI();
                renderOffline();
                playUpgradeSound();
                saveGame();
              }
            }
          );
          if (o.owned) card.classList.add("locked");
          list.appendChild(card);
        });
      }

      function renderQuantum() {
        const content = document.getElementById("drawer-content");
        content.textContent = "";
        const qGain = calcQuantumGain();
        const qThresh = quantumThresh();
        const canQ = G.coins >= qThresh;

        const qBtnLabel = el("span", { style: "font-size:10px" },
          "Gain " + qGain + " Quantum Points | Need " + fmt(qThresh));
        const qBtn = el("button", {
          className: "big-action-btn",
          id: "quantum-btn",
          disabled: !canQ,
        }, ["QUANTUM RESET", document.createElement("br"), qBtnLabel]);
        qBtn.onclick = doQuantumReset;

        const qInfo = el("div", { className: "quantum-info" }, [
          el("div", { className: "qi-row" }, [
            el("span", { className: "qi-label", textContent: "Quantum Points:" }),
            el("span", { className: "qi-val", textContent: String(G.quantumPoints) }),
          ]),
          el("div", { className: "qi-row" }, [
            el("span", { className: "qi-label", textContent: "Total Resets:" }),
            el("span", { className: "qi-val", textContent: String(G.quantum) }),
          ]),
        ]);

        const list = el("div", { id: "quantum-list" });
        content.appendChild(qBtn);
        content.appendChild(qInfo);
        content.appendChild(list);

        QUANTUM.forEach((q) => {
          const canBuy = G.quantumPoints >= q.cost || cheatFreeBuy;
          const card = buildUpgradeCard(
            q.icon, q.name, q.desc, null,
            q.cost + " QP", "Owned: " + q.owned, canBuy,
            () => {
              if (G.quantumPoints >= q.cost || cheatFreeBuy) {
                if (!cheatFreeBuy) G.quantumPoints -= q.cost;
                q.owned++;
                updateUI();
                renderQuantum();
                playUpgradeSound();
                saveGame();
              }
            }
          );
          list.appendChild(card);
        });
      }

      function buildStatCard(label, value) {
        return el("div", { className: "stat-card" }, [
          el("div", { className: "sc-lbl", textContent: label }),
          el("div", { className: "sc-val", textContent: value }),
        ]);
      }

      function renderStats() {
        const content = document.getElementById("drawer-content");
        content.textContent = "";
        const runtime = Date.now() - G.startTime;

        const grid = el("div", { className: "stat-grid" }, [
          buildStatCard("TOTAL EARNED", fmt(G.totalEarned)),
          buildStatCard("TOTAL CLICKS", fmt(G.totalClicks)),
          buildStatCard("ACTIVE CLICKS", fmt(G.totalClicks)),
          buildStatCard("CPS", fmt(getCPS())),
          buildStatCard("TAP POWER", fmt(getTap())),
          buildStatCard("RUNTIME", fmtTime(runtime)),
          buildStatCard("PRESTIGE", String(G.prestige)),
          buildStatCard("QUANTUM", String(G.quantum)),
        ]);

        const pBtnLabel = el("span", { style: "font-size:10px" },
          "Gain " + calcPrestigeGain() + " Prestige | Need " + fmt(prestigeThresh()));
        const pBtn = el("button", {
          className: "big-action-btn",
          id: "prestige-btn",
          disabled: G.coins < prestigeThresh(),
        }, ["PRESTIGE RESET", document.createElement("br"), pBtnLabel]);
        pBtn.onclick = doPrestige;

        content.appendChild(grid);
        content.appendChild(pBtn);
      }

      function renderSettings() {
        const content = document.getElementById("drawer-content");
        content.textContent = "";

        function settingRow(label, toggleId, isOn) {
          const toggle = el("div", { className: "toggle-btn" + (isOn ? " on" : ""), id: toggleId });
          return el("div", { className: "setting-row" }, [
            el("div", { className: "setting-label", textContent: label }),
            toggle,
          ]);
        }

        content.appendChild(settingRow("Dark Mode", "tog-dark", S.darkMode));
        content.appendChild(settingRow("Particles", "tog-part", S.particles));
        content.appendChild(settingRow("Tap Feedback", "tog-pconf", S.pconf));
        content.appendChild(settingRow("Sound Effects", "tog-sound", S.soundFx));
        content.appendChild(settingRow("Auto-Save", "tog-autosave", S.autoSave));

        const saveIntInput = el("input", {
          type: "number", id: "save-interval-input",
          min: "5", max: "300", value: String(S.saveInterval),
        });
        content.appendChild(el("div", { className: "setting-row" }, [
          el("div", { className: "setting-label", textContent: "Save Interval (s)" }),
          saveIntInput,
        ]));

        const themeNames = ["nexus", "crimson", "void", "emerald", "sunset", "ocean"];
        const themeGrid = el("div", { className: "theme-grid" });
        themeNames.forEach((name) => {
          themeGrid.appendChild(el("button", {
            className: "theme-quick-btn",
            "data-theme": name,
            textContent: name.toUpperCase(),
          }));
        });
        content.appendChild(el("div", {
          style: "margin-top:16px;padding:12px;background:var(--c1dim);border-radius:6px;"
        }, [
          el("div", {
            style: "font-size:9px;color:var(--txt2);margin-bottom:8px;letter-spacing:1px;",
            textContent: "THEME",
          }),
          themeGrid,
        ]));

        const wipeBtn = el("button", {
          className: "big-action-btn",
          id: "wipe-data-btn",
          textContent: "WIPE ALL DATA",
        });
        content.appendChild(el("div", { style: "margin-top:16px;" }, [wipeBtn]));

        applySettingsListeners();
      }

      function applySettingsListeners() {
        const togDark = document.getElementById("tog-dark");
        const togPart = document.getElementById("tog-part");
        const togPconf = document.getElementById("tog-pconf");
        const togSound = document.getElementById("tog-sound");
        const togAuto = document.getElementById("tog-autosave");
        const saveInt = document.getElementById("save-interval-input");
        const wipeBtn = document.getElementById("wipe-data-btn");

        if (togDark) {
          togDark.onclick = () => {
            S.darkMode = !S.darkMode;
            document.documentElement.classList.toggle("light-mode", !S.darkMode);
            togDark.classList.toggle("on", S.darkMode);
            saveGame();
          };
        }

        if (togPart) {
          togPart.onclick = () => {
            S.particles = !S.particles;
            togPart.classList.toggle("on", S.particles);
            saveGame();
          };
        }

        if (togPconf) {
          togPconf.onclick = () => {
            S.pconf = !S.pconf;
            togPconf.classList.toggle("on", S.pconf);
            saveGame();
          };
        }

        if (togSound) {
          togSound.onclick = () => {
            S.soundFx = !S.soundFx;
            togSound.classList.toggle("on", S.soundFx);
            saveGame();
            showToast(`Sound FX: ${S.soundFx ? "ON" : "OFF"}`);
          };
        }

        if (togAuto) {
          togAuto.onclick = () => {
            S.autoSave = !S.autoSave;
            togAuto.classList.toggle("on", S.autoSave);
            saveGame();
            showToast(`Auto-Save: ${S.autoSave ? "ON" : "OFF"}`);
            setupAutoSave();
          };
        }

        if (saveInt) {
          saveInt.addEventListener("change", (e) => {
            const val = parseInt(e.target.value, 10);
            if (Number.isFinite(val) && val >= 5 && val <= 300) {
              S.saveInterval = val;
              saveGame();
              setupAutoSave();
              showToast(`Save interval: ${val}s`);
            } else {
              e.target.value = S.saveInterval;
            }
          });
        }

        if (wipeBtn) {
          wipeBtn.onclick = () => {
            if (confirm("⚠️ WIPE ALL DATA? This cannot be undone!")) {
              localStorage.removeItem("nexus_v5");
              location.reload();
            }
          };
        }

        document.querySelectorAll(".theme-quick-btn").forEach((btn) => {
          btn.onclick = () => {
            const theme = btn.dataset.theme;
            applyTheme(theme);
            updateThemeButtons();
            if (theme === "crimson") {
              crimsonClickCount++;
              if (crimsonClickCount >= 5 && !adminMenuUnlocked) {
                adminMenuUnlocked = true;
                buildAdminMenu();
                showToast("⚡ ADMIN MENU UNLOCKED", 3000);
                saveGame();
              } else if (adminMenuUnlocked) {
                adminMenuUnlocked = false;
                destroyAdminMenu();
                crimsonClickCount = 0;
                showToast("Admin menu hidden", 2000);
                saveGame();
              }
            }
          };
        });
        updateThemeButtons();
      }

      // ═══════════════════════════════════════════
      //  PRESTIGE / QUANTUM
      // ═══════════════════════════════════════════
      function doPrestige() {
        if (G.coins < prestigeThresh()) return;
        const gain = calcPrestigeGain();
        G.prestige += gain;
        G.prestigeCoins += gain;
        G.coins = 0;
        G.totalClicks = 0;
        PPS.forEach((u) => (u.owned = 0));
        PPC.forEach((u) => (u.owned = 0));
        updateUI();
        switchTab("pps");
        playPrestigeSound();
        saveGame();
        showToast(`PRESTIGE +${gain}`, 3000);
      }

      function doQuantumReset() {
        if (G.coins < quantumThresh()) return;
        const gain = calcQuantumGain();
        G.quantum++;
        G.quantumPoints += gain;
        G.coins = 0;
        G.totalClicks = 0;
        G.prestige = 0;
        G.prestigeCoins = 0;
        PPS.forEach((u) => (u.owned = 0));
        PPC.forEach((u) => (u.owned = 0));
        OFFLINE.forEach((o) => (o.owned = false));
        updateUI();
        switchTab("quantum");
        playPrestigeSound();
        saveGame();
        showToast(`QUANTUM RESET +${gain} QP`, 3000);
      }

      function applyTheme(name) {
        const t = THEMES[name] || THEMES.nexus;
        const r = document.documentElement.style;
        Object.keys(t).forEach((k) => r.setProperty("--" + k, t[k]));
        document.getElementById("theme-meta").content = t.c1;
        S.theme = name;
        saveGame();
      }

      function updateThemeButtons() {
        document.querySelectorAll(".theme-quick-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.theme === S.theme);
        });
      }

      // ═══════════════════════════════════════════
      //  ADMIN MENU (dynamically injected — not in production DOM)
      // ═══════════════════════════════════════════
      function buildAdminMenu() {
        // Remove existing menu if present
        const existing = document.getElementById("cheat-wrap");
        if (existing) existing.remove();

        const wrap = el("div", { id: "cheat-wrap" });
        wrap.style.display = "block";

        const toggle = el("div", { id: "cheat-toggle", textContent: "⚡" });
        const dd = el("div", { id: "cheat-dd" });

        dd.appendChild(el("div", {
          style: "font-size:9px;color:var(--c4);margin-bottom:10px;letter-spacing:2px",
          textContent: "ADMIN MENU",
        }));

        const btnDefs = [
          { text: "∞ Infinite Coins", fn: () => { cheatInfiniteCoins = !cheatInfiniteCoins; showToast("∞ Coins: " + (cheatInfiniteCoins ? "ON" : "OFF")); } },
          { text: "🆓 Free Buys", fn: () => { cheatFreeBuy = !cheatFreeBuy; showToast("Free Buys: " + (cheatFreeBuy ? "ON" : "OFF")); } },
          { text: "+1000 CPS", fn: () => { PPS[0].owned += 100; saveGame(); updateUI(); if (activeTab === "pps") renderPPS(); showToast("+1000 CPS"); } },
          { text: "+100 Tap Power", fn: () => { PPC[0].owned += 100; saveGame(); updateUI(); if (activeTab === "ppc") renderPPC(); showToast("+100 Tap"); } },
          { text: "Force Prestige", fn: () => { doPrestige(); showToast("Prestige forced"); } },
          { text: "Force Quantum", fn: () => { if (G.coins >= quantumThresh()) { doQuantumReset(); showToast("Quantum forced"); } else { showToast("Need " + fmt(quantumThresh())); } } },
        ];
        btnDefs.forEach(({ text, fn }) => {
          const btn = el("button", { className: "ch-btn", textContent: text });
          btn.onclick = fn;
          dd.appendChild(btn);
        });

        // Coin input row with validation
        const coinInput = el("input", { type: "number", placeholder: "Amount" });
        const coinAddBtn = el("button", { className: "ch-btn", textContent: "Add" });
        coinAddBtn.onclick = () => {
          const v = parseFloat(coinInput.value);
          if (Number.isFinite(v) && v > 0 && v <= 1e18) {
            G.coins += v;
            updateUI();
            saveGame();
            showToast("+" + fmt(v));
          }
        };
        const inputRow = el("div", { className: "ch-input-row" }, [coinInput, coinAddBtn]);
        dd.appendChild(inputRow);

        // Quick-add buttons
        const quickBtns = el("div", { className: "ch-quick-btns" });
        [[1e3, "+1K"], [1e4, "+10K"], [1e5, "+100K"], [1e6, "+1M"], [1e7, "+10M"], [1e8, "+100M"]].forEach(([amt, label]) => {
          const btn = el("button", { className: "ch-btn", textContent: label });
          btn.onclick = () => { G.coins += amt; updateUI(); saveGame(); showToast(label); };
          quickBtns.appendChild(btn);
        });
        dd.appendChild(quickBtns);

        toggle.addEventListener("click", (e) => {
          e.stopPropagation();
          const isOpen = dd.classList.toggle("open");
          toggle.classList.toggle("open", isOpen);
          interactionLocked = isOpen;
        });

        dd.addEventListener("click", (e) => e.stopPropagation());

        wrap.appendChild(toggle);
        wrap.appendChild(dd);
        document.body.appendChild(wrap);

        // Close on outside click — store reference for cleanup in destroyAdminMenu
        if (adminMenuDocClickHandler) {
          document.removeEventListener("click", adminMenuDocClickHandler);
        }
        adminMenuDocClickHandler = (e) => {
          const cheatWrap = document.getElementById("cheat-wrap");
          if (cheatWrap && !cheatWrap.contains(e.target)) {
            dd.classList.remove("open");
            toggle.classList.remove("open");
            interactionLocked = false;
          }
        };
        document.addEventListener("click", adminMenuDocClickHandler);
      }

      function destroyAdminMenu() {
        const existing = document.getElementById("cheat-wrap");
        if (existing) existing.remove();
        interactionLocked = false;
        if (adminMenuDocClickHandler) {
          document.removeEventListener("click", adminMenuDocClickHandler);
          adminMenuDocClickHandler = null;
        }
      }

      // ═══════════════════════════════════════════
      //  TOAST
      // ═══════════════════════════════════════════
      function showToast(msg, dur = 2000) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), dur);
      }

      function showOfflineToast(amt, sec, capped) {
        let msg = `OFFLINE EARNINGS: +${fmt(amt)} (${fmtTime(sec * 1000)})`;
        if (capped) msg += " [CAPPED]";
        showToast(msg, 5000);
      }

      // ═══════════════════════════════════════════
      //  INIT
      // ═══════════════════════════════════════════
      loadGame();
      applyTheme(S.theme);
      updateThemeButtons();
      switchTab("pps");
      updateUI();
      setupAutoSave();

      if (!localStorage.getItem("nexus_seen_howto")) {
        showToast("TAP the center to earn credits! Open tabs for upgrades.", 6000);
        localStorage.setItem("nexus_seen_howto", "1");
      }

      setInterval(() => {
        if (activeTab === "pps") renderPPS();
        else if (activeTab === "ppc") renderPPC();
        else if (activeTab === "offline") renderOffline();
        else if (activeTab === "quantum") renderQuantum();
        else if (activeTab === "stats") updateUI();
      }, 400);
    </script>
